<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- Lock the viewport: device-width, no user scaling. Without this
       mobile browsers default to a ~980px layout and allow pinch /
       double-tap-to-zoom — double-tapping the dpad's empty corner cells
       would zoom the page instead of registering as input. `touch-action`
       on the controls (below) is the iOS-reliable belt to this braces,
       since iOS Safari ignores `user-scalable=no`. -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Fluxor — WASM runtime</title>
  <style>
    :root {
      --fg: #f2f2e9;
      --fg-dim: #c0c0b8;
      --fg-faint: #8a8a8a;
      --bg: #0e120e;
      --bg-card: #161916;
      --bg-canvas: #060806;
      --border: #2a2c2a;
      --accent: #4a9a4a;
      --accent-strong: #3a7a3a;
      --err: #ff8080;
      --info: #c8f2c8;
    }
    body {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: var(--bg);
      color: var(--fg);
      margin: 0;
      padding: 16px;
      max-width: 1100px;
    }
    h1 { font-size: 16px; margin: 0 0 4px; }
    p  { font-size: 12px; line-height: 1.55; margin: 4px 0; color: var(--fg-dim); }
    .small { color: var(--fg-faint); font-size: 11px; }
    #status { font-size: 11.5px; margin: 6px 0; color: var(--info); }
    /* Each presentation surface gets its own container. The generic
       shell creates one per `presentation.surfaces[]` entry. Layout
       defaults to vertical stack; per-graph CSS may override via the
       layout: hint. */
    .surface {
      margin: 12px 0;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg-canvas);
      overflow: hidden;
    }
    .surface[data-role="display"] {
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }
    .surface[data-role="display"] canvas { display: block; max-width: 100%; height: auto; }
    .surface[data-role="terminal"] {
      padding: 8px 10px;
      max-height: 30vh;
      overflow-y: auto;
      white-space: pre-wrap;
      font-size: 11px;
      line-height: 1.4;
      color: var(--fg-faint);
    }
    .surface[data-role="terminal"] .err  { color: var(--err); }
    .surface[data-role="terminal"] .info { color: var(--info); }
    .surface[data-role="player"] {
      padding: 16px 18px;
      cursor: pointer;
      user-select: none;
    }
    /* Touch-gamepad overlay surface.
       Fixed 960×540 virtual coordinate space — same units the
       wasm_browser_touch_gamepad_overlay module hit-tests against.
       Each child .overlay-btn is absolutely positioned in that
       space; the shell installs pointer listeners on this surface
       that translate clientX/clientY to surface-local coords before
       pushing into the global pointer queue, so the regions in JS
       and the regions in Rust agree by construction. */
    .surface[data-role="gamepad-overlay"] {
      position: relative;
      width: 960px;
      max-width: 100%;
      height: 540px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.05));
      touch-action: none;        /* suppress scroll / zoom on touch */
      user-select: none;
    }
    .overlay-btn {
      position: absolute;
      box-sizing: border-box;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(74, 154, 74, 0.18);
      color: var(--fg-dim);
      font-size: 11px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;       /* hit-testing happens on the parent */
    }
    .overlay-btn.bumper { border-radius: 4px; }
    .surface[data-role="gamepad-overlay"]:active { background: rgba(74, 154, 74, 0.06); }
    .player-row { display: flex; align-items: center; gap: 12px; }
    .player-icon {
      flex: 0 0 auto;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--accent-strong);
      color: var(--fg);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .player-icon.paused { background: var(--accent-strong); opacity: 0.6; }
    .player-title {
      flex: 1 1 auto;
      font-size: 13px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .player-count { color: var(--fg-faint); font-size: 11px; }
    .player-bar {
      margin-top: 12px;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .player-bar > .fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 120ms linear;
    }
    #debug {
      margin-top: 12px;
      position: relative;
    }
    #debug-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 8px;
      background: var(--bg-canvas);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      font-size: 11px;
      color: var(--fg-faint);
    }
    #debug-toolbar .title { font-weight: 600; letter-spacing: 0.5px; }
    #debug-toolbar button {
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 2px 10px;
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
    }
    #debug-toolbar button:hover { background: var(--accent-strong); }
    #debug-toolbar button:active { transform: translateY(1px); }
    #debug-toolbar button.copied {
      background: var(--info, #2a7a4a);
      color: var(--fg);
    }
    #log {
      white-space: pre-wrap; font-size: 11px; line-height: 1.4;
      max-height: 20vh; overflow-y: auto;
      padding: 6px 8px; background: var(--bg-canvas);
      border: 1px solid var(--border); border-top: none;
      border-radius: 0 0 4px 4px;
      color: var(--fg-faint);
    }
    .err  { color: var(--err); }
    .info { color: var(--info); }

    /* Collapsible debug panel. Collapsed by default in player mode so the
       display gets the room; the toolbar toggle expands it on demand. */
    #debug.collapsed #log { display: none; }
    #debug-toolbar .spacer { flex: 1 1 auto; }

    /* ── Player mode ──────────────────────────────────────────────────
       Activated (body.player-mode) when the scenario declares
       `presentation.controls`. Mirrors browser_surface.css — the same
       canvas+controls layout the WebSocket split page uses — so the
       full-wasm and split experiences match: full-viewport pixelated
       canvas, orientation-driven control placement, no page chrome. */
    body.player-mode {
      --surface-bg: #0f1410;
      --surface-fg: #d8e9c8;
      --button-border: 2px solid rgba(216, 233, 200, 0.68);
      --button-active-bg: rgba(216, 233, 200, 0.80);
      --canvas-bg: #0f380f;
      --canvas-aspect: 1;
      margin: 0;
      padding: 0;
      max-width: none;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      background: var(--surface-bg);
      color: var(--surface-fg);
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }
    /* Hide the generic shell chrome — title, caption, status line, the
       #surfaces wrapper (we build our own .stage). */
    body.player-mode > h1,
    body.player-mode > p,
    body.player-mode > #status,
    body.player-mode > #surfaces { display: none; }

    body.player-mode .stage {
      position: relative;
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-width: 0;
      min-height: 0;
      background: var(--bg-canvas);
    }
    /* The canvas sink (host_shims.js) sets inline `max-width:100%;
       height:auto`, which only shrinks oversized content — a native
       160×144 GB frame would stay tiny. Force it to fill the stage and
       letterbox via object-fit (need !important to beat the inline
       styles); pixelated keeps the upscale crisp. */
    body.player-mode .stage canvas {
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
      object-fit: contain;
      image-rendering: pixelated;
      background: var(--canvas-bg);
      display: block;
      touch-action: manipulation;
      cursor: default;
    }
    /* Controls is a 2×2 grid in BOTH orientations: dpad + face cluster
       share the top row, START/SELECT span the bottom. The body's
       flex-direction (set per orientation) places this whole block below
       the canvas in portrait and beside it in landscape; the grid itself
       stays the same so the clusters fill their cells and never overflow
       into each other (side-by-side) or off-screen (stacked). */
    body.player-mode .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr auto;
      grid-template-areas: "dpad face" "menu menu";
      place-items: center;
      gap: 6px 4px;
      padding: 8px 4px;
      box-sizing: border-box;
      touch-action: manipulation;
    }
    body.player-mode .dpad {
      grid-area: dpad;
      width: min(73%, 260px);
      aspect-ratio: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      /* The dpad cross leaves the four corner cells empty — without
         touch-action here a double-tap on a corner hits the .dpad box
         and triggers double-tap-to-zoom instead of doing nothing. */
      touch-action: manipulation;
    }
    body.player-mode .pad-button {
      appearance: none;
      border: var(--button-border);
      background: rgba(8, 16, 8, 0.34);
      color: var(--surface-fg);
      border-radius: 8px;
      font: 700 clamp(20px, 5.8vmin, 40px) system-ui, sans-serif;
      display: grid;
      place-items: center;
      padding: 0;
      touch-action: manipulation;
      text-shadow: 0 1px 2px #000;
    }
    body.player-mode .pad-button:focus { outline: none; }
    body.player-mode .pad-button.active {
      background: var(--button-active-bg);
      color: var(--surface-bg);
    }
    body.player-mode .pad-up    { grid-column: 2; grid-row: 1; }
    body.player-mode .pad-left  { grid-column: 1; grid-row: 2; }
    body.player-mode .pad-right { grid-column: 3; grid-row: 2; }
    body.player-mode .pad-down  { grid-column: 2; grid-row: 3; }
    body.player-mode .face-buttons {
      grid-area: face;
      width: min(73%, 260px);
      display: grid;
      gap: 12px;
    }
    body.player-mode .menu-buttons { grid-area: menu; margin-bottom: 24px; }
    body.player-mode .row-buttons { grid-area: menu; margin-bottom: 24px; }
    /* Disable double-tap-to-zoom on every touchable surface of the
       player (empty gaps between clusters / buttons included), so a
       quick double-press is always input, never a page zoom. */
    body.player-mode,
    body.player-mode .stage,
    body.player-mode .face-buttons,
    body.player-mode .menu-buttons,
    body.player-mode .row-buttons {
      touch-action: manipulation;
    }
    body.player-mode .face-buttons .pad-button {
      border-radius: 50%;
      aspect-ratio: 1;
      font-size: clamp(20px, 5.4vmin, 36px);
    }
    /* Angle the A/B cluster like a classic handheld: B sits low-left, A
       high-right, on a gentle diagonal. The glyphs stay upright (we
       offset, not rotate). */
    body.player-mode .face-buttons .pad-button[data-control="a"] { transform: translateY(-26%); }
    body.player-mode .face-buttons .pad-button[data-control="b"] { transform: translateY(26%); }
    body.player-mode .menu-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    body.player-mode .menu-buttons .pad-button {
      width: clamp(64px, 19vmin, 96px);
      height: clamp(26px, 8vmin, 38px);
      font-size: clamp(13px, 4vmin, 19px);
      border-radius: 14px;
    }
    body.player-mode .row-buttons { display: grid; gap: 12px; }
    body.player-mode .row-buttons .pad-button {
      width: clamp(48px, 13.5vmin, 78px);
      aspect-ratio: 1;
      font-size: clamp(19px, 5.1vmin, 27px);
    }
    /* In player mode the debug panel floats so it never steals display
       space. Collapsed: a small toggle in the TOP-right corner (over the
       canvas letterbox, clear of the bottom controls). Expanded: a
       full-width panel pinned to the bottom so the log is readable. */
    body.player-mode #debug {
      position: fixed;
      z-index: 10;
      margin: 0;
      opacity: 0.92;
    }
    body.player-mode #debug.collapsed {
      top: 8px;
      right: 8px;
    }
    body.player-mode #debug:not(.collapsed) {
      left: 8px;
      right: 8px;
      bottom: 8px;
    }
    /* The 2×2 grid layout lives in the base `.controls` rule; each
       orientation only sets the block's footprint (a wide row below the
       canvas in portrait, a tall column beside it in landscape). */
    @media (orientation: portrait) {
      body.player-mode { flex-direction: column; }
      body.player-mode .stage { width: 100%; }
      body.player-mode .controls {
        flex: 0 0 auto;
        width: 100%;
        height: min(52dvh, 520px);
      }
    }
    @media (orientation: landscape) {
      body.player-mode { flex-direction: row; }
      body.player-mode .stage { height: 100%; }
      body.player-mode .controls {
        flex: 0 0 auto;
        height: 100%;
        width: min(52vw, 520px);
      }
    }
  </style>
</head>
<body>
  <h1 id="scenarioTitle">Fluxor — WASM</h1>
  <p class="small" id="scenarioCaption">Loading scenario…</p>
  <div id="status">idle</div>

  <!-- The generic shell composes the surface DOM from the
       `presentation:` block of the running scenario's wasm component
       graph. Anything in here at page-load time gets replaced once
       the scenario JSON resolves. -->
  <div id="surfaces"></div>

  <!-- Debug log panel. Toolbar provides a one-click copy of every
       line in the on-page log — useful when reporting kernel-side
       state (bank heartbeat counters, port-table dumps, etc.) without
       opening browser dev tools. Mounts on every wasm runtime
       (pure-wasm scenarios + thin viewer/player halves of splits)
       because the canonical runtime.html shell is the single source
       of truth for every wasm bundle's host page. -->
  <div id="debug" class="collapsed">
    <div id="debug-toolbar">
      <span class="title">debug log</span>
      <span class="spacer"></span>
      <button id="debug-toggle" type="button" title="Show/hide the debug log">Show log</button>
      <button id="debug-copy" type="button" title="Copy all log lines to clipboard">Copy</button>
    </div>
    <div id="log"></div>
  </div>

  <!-- Mount-aware bootstrap.
       The synthesiser may mount this shell at any URL prefix:
         pure-wasm scenarios → /
         split scenarios (via on:-binding) → /viewer (or any user prefix)
       Both `host_shims.js` and `scenario.json` are siblings of this
       page on whichever prefix is in use. We compute the base path
       from window.location once and use it for every dependent fetch.
       Computing dynamically (rather than baking absolute paths into
       the HTML at synthesis time) keeps runtime.html byte-identical
       across scenarios so the host-FS route can serve the same file
       in every deployment. -->
  <script type="module">
    function computeFluxorBase() {
      // Three mount shapes to handle:
      //   /            → base /            (pure-wasm)
      //   /viewer      → base /viewer/     (split — http module's
      //                                     implicit prefix-match
      //                                     serves both /viewer and
      //                                     /viewer/<file>)
      //   /index.html  → base /            (file-like last segment)
      const p = window.location.pathname;
      if (p.endsWith('/')) return p;
      const lastSlash = p.lastIndexOf('/');
      const lastSegment = p.slice(lastSlash + 1);
      // A `.` in the last segment means it looks like a file (e.g.
      // /foo.html), so base is the directory that holds it.
      if (lastSegment.includes('.')) return p.slice(0, lastSlash + 1);
      // Otherwise it's a directory-style mount — append the slash.
      return p + '/';
    }
    window.__fluxorBase = computeFluxorBase();

    function loadHostShims(base) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = base + 'host_shims.js';
        s.onload = resolve;
        s.onerror = () => reject(new Error('host_shims.js failed to load from ' + s.src));
        document.head.appendChild(s);
      });
    }
    window.__fluxorShimReady = loadHostShims(window.__fluxorBase);
  </script>

  <script type="module">
    const logEl    = document.getElementById('log');
    const statusEl = document.getElementById('status');
    const surfacesEl = document.getElementById('surfaces');
    const titleEl  = document.getElementById('scenarioTitle');
    const captionEl = document.getElementById('scenarioCaption');

    // Per-step scheduler telemetry (heavy-step / budget-overrun /
    // host-oversleep) floods the panel — often 95%+ of lines on a
    // graph that runs near the tick budget. It's perf noise, not
    // player-facing signal, so keep it out of the log. The kernel still
    // emits it; we just don't render it here.
    const LOG_NOISE = /MON_HEAVY_STEP|MON_BUDGET_OVERRUN|MON_HOST_OVERSLEEP/;
    const LOG_MAX_LINES = 400;
    function append(text, cls = '') {
      if (LOG_NOISE.test(text)) return;
      const span = document.createElement('span');
      if (cls) span.className = cls;
      span.textContent = text + '\n';
      logEl.appendChild(span);
      // Bound DOM growth — a long-running emulator would otherwise leak
      // unbounded log nodes.
      while (logEl.childNodes.length > LOG_MAX_LINES) {
        logEl.removeChild(logEl.firstChild);
      }
      logEl.scrollTop = logEl.scrollHeight;
    }
    function setStatus(t) { statusEl.textContent = t; }

    // Debug-log collapse toggle. Collapsed by default (see the markup's
    // `class="collapsed"`) so the display owns the screen; the button
    // expands it on demand and relabels itself.
    const debugEl = document.getElementById('debug');
    const debugToggle = document.getElementById('debug-toggle');
    if (debugToggle && debugEl) {
      debugToggle.addEventListener('click', () => {
        const collapsed = debugEl.classList.toggle('collapsed');
        debugToggle.textContent = collapsed ? 'Show log' : 'Hide log';
      });
    }

    // ── Input: keyboard + on-screen touch controls ────────────────────
    //
    // `wasm_browser_dom_input` drains this queue via `host_input_pop`.
    // The wire shape it expects: a `keyCode` whose bit 15 is the
    // pressed/released flag (host_input_pop writes key_lo/key_hi; the
    // consumer reads `pressed = key_hi & 0x80`, `code = low 15 bits`).
    // This queue is passed to buildHostImports below; previously nothing
    // fed it, so the wasm player had no working input at all.
    const inputQueue = [];
    const PRESSED_BIT = 0x8000;
    function pushKey(code, down) {
      inputQueue.push({ keyCode: (code & 0x7fff) | (down ? PRESSED_BIT : 0), modifiers: 0 });
    }
    // Physical keyboard → queue. Dedupe auto-repeat by tracking held
    // codes, and swallow the default action (scroll on arrows/space) so
    // the page stays put while playing.
    const heldKeys = new Set();
    window.addEventListener('keydown', (e) => {
      const c = e.keyCode || e.which;
      if (!c) return;
      if (!heldKeys.has(c)) { heldKeys.add(c); pushKey(c, true); }
      if ([13, 16, 32, 37, 38, 39, 40].includes(c)) e.preventDefault();
    });
    window.addEventListener('keyup', (e) => {
      const c = e.keyCode || e.which;
      if (!c) return;
      heldKeys.delete(c);
      pushKey(c, false);
    });

    // Player mode: when the scenario declares `presentation.controls`,
    // build the canvas + on-screen control layout that mirrors the
    // WebSocket split page (browser_surface.css). Returns the `.stage`
    // element the canvas sink should mount into, or null if the scenario
    // has no controls (the generic surface flow then applies unchanged).
    const CONTROL_LABELS = {
      up: '▲', down: '▼', left: '◀', right: '▶',
      a: 'A', b: 'B', x: 'X', y: 'Y',
      select: 'SEL', start: 'START',
    };
    const DPAD_ITEMS = ['up', 'left', 'right', 'down'];
    const DPAD_POS = { up: 'pad-up', left: 'pad-left', right: 'pad-right', down: 'pad-down' };
    const GROUP_CLASS = { dpad: 'dpad', menu: 'menu-buttons', face: 'face-buttons', row: 'row-buttons' };

    function controlLabel(c) {
      return CONTROL_LABELS[c] != null ? CONTROL_LABELS[c] : String(c).toUpperCase();
    }

    function setupPlayerMode(scenario) {
      const pres = scenario.presentation || {};
      const groups = pres.controls;
      if (!Array.isArray(groups) || groups.length === 0) return null;
      const keymap = pres.keymap || {};
      const theme = pres.theme || {};

      document.body.classList.add('player-mode');
      const setVar = (name, val) => { if (val != null) document.body.style.setProperty(name, String(val)); };
      setVar('--surface-bg', theme.surface_bg);
      setVar('--surface-fg', theme.surface_fg);
      setVar('--canvas-bg', theme.canvas_bg);
      setVar('--canvas-aspect', theme.canvas_aspect);

      const stage = document.createElement('div');
      stage.className = 'stage';

      const controls = document.createElement('div');
      controls.className = 'controls';
      controls.setAttribute('aria-label', 'game controls');

      const bindButton = (btn, code) => {
        if (code == null) return;
        const press = (ev) => { ev.preventDefault(); btn.classList.add('active'); pushKey(code, true); };
        const release = () => { btn.classList.remove('active'); pushKey(code, false); };
        btn.addEventListener('pointerdown', (ev) => { btn.setPointerCapture(ev.pointerId); press(ev); });
        btn.addEventListener('pointerup', release);
        btn.addEventListener('pointercancel', release);
        btn.addEventListener('pointerleave', (ev) => { if (ev.buttons) release(); });
      };

      for (const g of groups) {
        const cls = GROUP_CLASS[g.kind];
        if (!cls) continue;
        const items = g.kind === 'dpad' ? (g.items || DPAD_ITEMS) : (g.items || []);
        const box = document.createElement('div');
        box.className = cls;
        if (g.kind === 'dpad') box.setAttribute('aria-label', 'direction pad');
        if (g.kind === 'face' && items.length) {
          box.style.gridTemplateColumns = `repeat(${items.length}, 1fr)`;
          box.style.aspectRatio = String(items.length);
        } else if (g.kind === 'row' && items.length) {
          box.style.gridTemplateColumns = `repeat(${items.length}, minmax(32px, 1fr))`;
        } else if (g.kind === 'menu' && items.length && items.length !== 2) {
          box.style.gridTemplateColumns = `repeat(${items.length}, 1fr)`;
        }
        for (const control of items) {
          const btn = document.createElement('button');
          btn.className = 'pad-button';
          if (g.kind === 'dpad' && DPAD_POS[control]) btn.classList.add(DPAD_POS[control]);
          btn.type = 'button';
          btn.setAttribute('data-control', control);
          btn.setAttribute('aria-label', control);
          btn.textContent = controlLabel(control);
          bindButton(btn, keymap[control]);
          box.appendChild(btn);
        }
        controls.appendChild(box);
      }

      document.body.appendChild(stage);
      document.body.appendChild(controls);
      return stage;
    }
    let playerStage = null;

    // Copy-log-to-clipboard. Uses the modern Clipboard API when
    // available (browsers permit it from a user-gesture handler),
    // falls back to a transient `<textarea>` + `document.execCommand`
    // for older Safari / strict-CSP contexts. The visual feedback
    // ("Copied!" → "Copy") closes the loop so a tap doesn't feel
    // silently lost.
    const copyBtn = document.getElementById('debug-copy');
    if (copyBtn) {
      copyBtn.addEventListener('click', async () => {
        const text = logEl.innerText;
        const reset = () => setTimeout(() => {
          copyBtn.textContent = 'Copy';
          copyBtn.classList.remove('copied');
        }, 1200);
        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
          } else {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.top = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
          }
          copyBtn.textContent = 'Copied!';
          copyBtn.classList.add('copied');
        } catch (err) {
          copyBtn.textContent = 'Copy failed';
          copyBtn.classList.add('copied');
        }
        reset();
      });
    }

    // ---------------------------------------------------------------
    // Scenario introspection
    //
    // The scenario synthesiser auto-mounts `/scenario.json` with the
    // active wasm component's metadata: scenario name, the
    // `presentation:` block (surfaces + layout), bundle URL, playlist
    // source. The shell composes the DOM from this then drives the
    // kernel.
    //
    // Schema:
    //   {
    //     "scenario": "image_viewer",
    //     "bundle":   "/fluxor.wasm",
    //     "playlist": {
    //       "source": "/api/list",
    //       "filter": "image",              // image | audio | any
    //       "loop":   true
    //     },
    //     "presentation": {
    //       "layout": "stacked",            // future: grid, absolute
    //       "surfaces": [
    //         { "module": "display",  "role": "display",  "id": "main" },
    //         { "module": "terminal", "role": "terminal", "id": "log",
    //           "rows": 12 }
    //       ]
    //     }
    //   }
    //
    // Per-role DOM construction is encapsulated in `buildSurface()`.
    // Surface IDs become DOM ids; the shim consults them to know
    // where to mount canvas / blit pixels / route input events.
    // ---------------------------------------------------------------

    async function loadScenario() {
      append(`[shell] base path: ${window.__fluxorBase}`, 'info');
      append('[shell] awaiting host_shims.js …', 'info');
      try { await window.__fluxorShimReady; }
      catch (err) { append(`[shell] shim load failed: ${err.message}`, 'err'); throw err; }
      append('[shell] shim ready; fetching scenario.json', 'info');
      const r = await fetch(window.__fluxorBase + 'scenario.json');
      append(`[shell] scenario.json → HTTP ${r.status}`, r.ok ? 'info' : 'err');
      if (!r.ok) throw new Error(`fetch /scenario.json: ${r.status}`);
      return r.json();
    }

    // Canonical touch-gamepad-overlay region table. MUST match
    // `src/platform/wasm/touch_gamepad_overlay.rs::REGIONS`
    // byte-for-byte — the module hit-tests against the Rust copy;
    // this JS copy drives the visual overlay. The coverage test
    // at `tools/tests/wasm_touch_overlay_layout.rs` parses both
    // sources and asserts row-for-row identity, so this comment
    // can stay terse: drift fails `make test`.
    const TOUCH_OVERLAY_REGIONS = [
      // { btn name → label, x, y, w, h, class }
      { btn: 'DPAD_UP',    label: '▲',  x: 100, y: 290, w: 60, h: 60 },
      { btn: 'DPAD_LEFT',  label: '◀',  x:  40, y: 350, w: 60, h: 60 },
      { btn: 'DPAD_RIGHT', label: '▶',  x: 160, y: 350, w: 60, h: 60 },
      { btn: 'DPAD_DOWN',  label: '▼',  x: 100, y: 410, w: 60, h: 60 },
      { btn: 'Y',          label: 'Y',  x: 800, y: 290, w: 60, h: 60 },
      { btn: 'X',          label: 'X',  x: 740, y: 350, w: 60, h: 60 },
      { btn: 'B',          label: 'B',  x: 860, y: 350, w: 60, h: 60 },
      { btn: 'A',          label: 'A',  x: 800, y: 410, w: 60, h: 60 },
      { btn: 'L1',         label: 'L1', x:   0, y:   0, w: 200, h: 40, cls: 'bumper' },
      { btn: 'R1',         label: 'R1', x: 760, y:   0, w: 200, h: 40, cls: 'bumper' },
      { btn: 'SELECT',     label: 'SEL', x: 380, y:  10, w:  90, h: 30 },
      { btn: 'START',      label: 'START', x: 490, y:  10, w:  90, h: 30 },
    ];

    // Install W3C PointerEvent listeners on `el` and push records
    // into `window.__fluxor_pointer_queue` for `wasm_browser_pointer`
    // to drain via `host_pointer_pop`. Coords are surface-local in
    // the canonical 960×540 space (matches every graph's display
    // module / touch-overlay region table). Called for any surface
    // that the wasm graph can consume input from — display, player,
    // gamepad-overlay. The gamepad-overlay path also renders visual
    // button DOM on top via `buildOverlayButtons()`.
    //
    // The same DOM events also feed `__fluxor_button_queue` for
    // `wasm_browser_button` (the canonical BUTTON capability driver,
    // wasm equivalent of `flash_rp` on rp). One DOM tap, one
    // 0x01-then-0x00 transition pair — same wire shape every
    // platform's button driver produces. Downstream `gesture`
    // counts clicks and emits FMP commands.
    function installPointerListeners(el) {
      const pointerQ = window.__fluxor_pointer_queue
        || (window.__fluxor_pointer_queue = []);
      const buttonQ = window.__fluxor_button_queue
        || (window.__fluxor_button_queue = []);
      function localCoords(ev) {
        const rect = el.getBoundingClientRect();
        // Scale page→surface if the surface is shrunk by max-width.
        const scaleX = 960 / rect.width;
        const scaleY = 540 / rect.height;
        return {
          x: Math.round((ev.clientX - rect.left) * scaleX),
          y: Math.round((ev.clientY - rect.top)  * scaleY),
        };
      }
      function pushPointer(ev, kind) {
        const { x, y } = localCoords(ev);
        pointerQ.push({
          pointerId: ev.pointerId & 0xFF,
          kind,
          buttons: ev.buttons & 0xFF,
          modifiers:
            (ev.shiftKey ? 0x01 : 0) | (ev.ctrlKey  ? 0x02 : 0) |
            (ev.altKey   ? 0x04 : 0) | (ev.metaKey  ? 0x08 : 0),
          pressure: Math.round((ev.pressure || (kind === 1 ? 0.5 : 0)) * 1023),
          x, y,
        });
      }
      // Canonical BUTTON capability — one byte per debounced edge.
      // De-dupe so a multi-touch DOWN burst doesn't repeat 0x01.
      let buttonHeld = false;
      function setButton(pressed) {
        if (pressed && !buttonHeld) {
          buttonHeld = true;
          buttonQ.push(0x01);
        } else if (!pressed && buttonHeld) {
          buttonHeld = false;
          buttonQ.push(0x00);
        }
      }
      // input::pointer::KIND_*  →  1=DOWN, 2=UP, 3=MOVE, 4=CANCEL
      el.addEventListener('pointerdown', (e) => {
        el.setPointerCapture(e.pointerId);
        pushPointer(e, 1);
        setButton(true);
      });
      el.addEventListener('pointerup', (e) => {
        pushPointer(e, 2);
        setButton(false);
        el.releasePointerCapture(e.pointerId);
      });
      el.addEventListener('pointermove', (e) => {
        if (e.buttons || e.pressure > 0) pushPointer(e, 3);
      });
      el.addEventListener('pointercancel', (e) => {
        pushPointer(e, 4);
        setButton(false);
      });
      // Suppress the browser context menu so right-click reaches the
      // wasm graph as `BTN_SECONDARY` instead of opening the OS menu.
      // (The button capability driver only signals press/release;
      // graphs that need to distinguish primary vs secondary clicks
      // wire `wasm_browser_pointer` directly instead.)
      el.addEventListener('contextmenu', (e) => { e.preventDefault(); });
    }

    function buildOverlayButtons(el) {
      // Render the canonical region table as labelled buttons. The
      // hit-testing happens in the wasm_browser_touch_gamepad_overlay
      // module against an identical region table on the Rust side;
      // these DOM elements are purely visual landmarks.
      for (const r of TOUCH_OVERLAY_REGIONS) {
        const b = document.createElement('div');
        b.className = 'overlay-btn' + (r.cls ? (' ' + r.cls) : '');
        b.style.left   = r.x + 'px';
        b.style.top    = r.y + 'px';
        b.style.width  = r.w + 'px';
        b.style.height = r.h + 'px';
        b.textContent  = r.label;
        b.dataset.btn  = r.btn;
        el.appendChild(b);
      }
    }

    function buildSurface(spec) {
      const el = document.createElement('div');
      el.className = 'surface';
      el.id = 'surface-' + spec.id;
      el.dataset.role = spec.role;
      el.dataset.module = spec.module;
      if (spec.role === 'player') {
        el.title = 'tap = play/pause, double-tap = next, triple-tap = previous';
        el.innerHTML = `
          <div class="player-row">
            <div class="player-icon paused" data-icon>▶</div>
            <div style="flex:1;min-width:0">
              <div class="player-title" data-title>tap to play</div>
              <div class="player-count small" data-count></div>
            </div>
          </div>
          <div class="player-bar"><div class="fill" data-fill></div></div>`;
      } else if (spec.role === 'display') {
        el.title = 'click = next, right-click = previous';
      } else if (spec.role === 'gamepad-overlay') {
        buildOverlayButtons(el);
      }
      // Interactive surfaces forward DOM events to the wasm graph
      // via two queues:
      //   __fluxor_pointer_queue → `wasm_browser_pointer` (W3C
      //                            pointer events — coords,
      //                            multi-touch, modifiers; used
      //                            by gamepad overlay etc.)
      //   __fluxor_button_queue  → `wasm_browser_button` (canonical
      //                            BUTTON capability — one byte
      //                            per debounced press/release;
      //                            wasm equivalent of `flash_rp`
      //                            on rp boards). Downstream
      //                            `gesture` does click counting +
      //                            FMP mapping.
      // The JS shell stays a dumb pipe — graphs pick which driver
      // they consume.
      if (spec.role === 'display' ||
          spec.role === 'player'  ||
          spec.role === 'gamepad-overlay') {
        installPointerListeners(el);
      }
      return el;
    }

    function composeDom(scenario) {
      titleEl.textContent = `Fluxor — ${scenario.scenario}`;
      captionEl.textContent = scenario.caption ||
        `WASM kernel running ${scenario.scenario}. Playlist driven by ${scenario.playlist?.source || '(none)'}.`;
      surfacesEl.replaceChildren();
      const byRole = new Map();
      for (const spec of scenario.presentation.surfaces) {
        const el = buildSurface(spec);
        surfacesEl.appendChild(el);
        byRole.set(spec.role, el);
      }
      return byRole;
    }

    // ---------------------------------------------------------------
    // Playlist + navigation
    //
    // Reads /api/list, filters by extension class, builds URLs that
    // hit the dual-mode FS_LIST file-serve (PR 9). Per-role nav:
    // display surfaces use single-click = next / double-click = prev;
    // player surfaces use single-click = play/pause, double-click =
    // next.
    // ---------------------------------------------------------------

    const EXT_FILTERS = {
      image: /\.(png|jpe?g|gif|bmp|webp)$/i,
      audio: /\.(wav|mp3|aac|ogg|flac)$/i,
      any:   /./,
    };

    async function loadPlaylist(spec) {
      try {
        const r = await fetch(spec.source);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const j = await r.json();
        const filter = EXT_FILTERS[spec.filter] || EXT_FILTERS.any;
        const names = (j.items || []).filter(n => filter.test(n));
        if (!names.length) throw new Error('list empty');
        const urls = names.map(n => `${spec.source}/${n}`);
        append(`[playlist] ${spec.source} → ${urls.length} entries`, 'info');
        return urls;
      } catch (err) {
        append(`[playlist] ${spec.source} failed (${err.message})`, 'err');
        return [];
      }
    }

    // ---------------------------------------------------------------
    // Kernel lifecycle
    // ---------------------------------------------------------------

    let kernel = null;
    let loopHandle = null;
    let currentAssetUrl = null;

    // Asset bank: bundle-level (one Map<name, Uint8Array> shared across
    // every kernel boot). We compile the bundle once with
    // WebAssembly.compile(), extract the `fluxor.assets` custom
    // section, and reuse the resulting WebAssembly.Module for every
    // subsequent instantiate() call. Saves re-parsing 2-10 MB of wasm
    // every time the user clicks "next image".
    let bundleModule = null;
    let bundleAssetBank = new Map();

    async function loadBundleOnce(scenario) {
      if (bundleModule) return;
      setStatus(`fetching ${scenario.bundle}`);
      const bundleResp = await fetch(scenario.bundle);
      if (!bundleResp.ok) throw new Error(`bundle fetch ${bundleResp.status}`);
      const bundleBytes = await bundleResp.arrayBuffer();
      bundleModule = await WebAssembly.compile(bundleBytes);
      // Extract the asset bank, if any. customSections returns an
      // array of ArrayBuffers; we take the first (the appender only
      // ever emits one).
      const sections = WebAssembly.Module.customSections(bundleModule, 'fluxor.assets');
      if (sections.length > 0) {
        try {
          bundleAssetBank = window.fluxor.parseAssetBank(sections[0]);
          append(`[bundle] asset bank: ${bundleAssetBank.size} entries`, 'info');
        } catch (err) {
          append(`[bundle] asset bank parse failed: ${err.message}`, 'err');
          bundleAssetBank = new Map();
        }
      }
    }

    function teardownKernel() {
      if (loopHandle) { cancelAnimationFrame(loopHandle); loopHandle = null; }
      kernel = null;
    }

    async function bootKernel(scenario, surfacesByRole, assetUrl) {
      teardownKernel();
      await loadBundleOnce(scenario);
      // `assetUrl` is the JS-side per-track URL override used by
      // host_browser_fetch — irrelevant when bank reads from the
      // bundle's embedded asset bank (the canonical audio_player
      // path). Show a useful prompt instead of the misleading
      // "(no asset)" placeholder.
      if (assetUrl) {
        setStatus(`booting ${assetUrl}`);
      } else {
        setStatus('ready — tap player to start');
      }
      currentAssetUrl = assetUrl;

      // Container resolution: canvas modules render into the display
      // surface; everything else (audio, input) doesn't need a DOM
      // mount but the shim accepts the display container as a fallback
      // for any module that decides to mount its own widget.
      // In player mode the canvas mounts into our `.stage`; otherwise it
      // falls back to the generic display/player surface.
      const displayEl = playerStage || surfacesByRole.get('display') || surfacesByRole.get('player') || document.body;

      const imports = window.fluxor.buildHostImports({
        getKernel: () => kernel,
        onLog: (level, msg) => append(`[wasm] ${msg}`, level >= 3 ? 'err' : ''),
        onPanic: (msg) => {
          append(`[wasm PANIC] ${msg}`, 'err');
          teardownKernel();
        },
        onCanvasFrame: (w, h) => setStatus(`rendered ${w}×${h}`),
        canvasContainer: displayEl,
        fetchUrlOverride: (req) => currentAssetUrl || req,
        assetBank: bundleAssetBank,
        // Feeds wasm_browser_dom_input via host_input_pop (keyboard +
        // on-screen touch controls). Without this the queue is empty and
        // the player has no input.
        inputQueue,
      });

      const instance = await WebAssembly.instantiate(bundleModule, imports);
      kernel = instance;

      const kInit = kernel.exports.kernel_init;
      const kStep = kernel.exports.kernel_step;
      if (typeof kInit !== 'function' || typeof kStep !== 'function') {
        const have = Object.keys(kernel.exports).filter(k => k.startsWith('kernel_')).join(', ');
        const msg = `kernel exports missing: need kernel_init + kernel_step, have [${have}]`;
        append(`[wasm] ${msg}`, 'err');
        throw new Error(msg);
      }
      append(`[wasm] kernel exports: ${Object.keys(kernel.exports).filter(k => k.startsWith('kernel_')).join(', ')}`, 'info');
      const initRet = kInit();
      append(`[wasm] kernel_init() → ${initRet}`, 'info');

      let ticked = 0;
      function frame() {
        for (let i = 0; i < 32; i++) {
          try { kStep(); ticked++; }
          catch (err) {
            append(`[wasm] kernel_step trapped after ${ticked} ticks: ${err.message || err}`, 'err');
            return;
          }
        }
        loopHandle = requestAnimationFrame(frame);
      }
      loopHandle = requestAnimationFrame(frame);
    }

    // ---------------------------------------------------------------
    // Per-role interaction wiring
    // ---------------------------------------------------------------

    function fileName(url) {
      const i = url.lastIndexOf('/');
      return i >= 0 ? url.slice(i + 1) : url;
    }

    // Navigation is handled by wasm-side modules now
    // (wasm_browser_button → gesture → bank.commands), so the JS
    // shell just boots the kernel ONCE
    // and lets pointer events flow through `installPointerListeners`
    // → `__fluxor_pointer_queue` → `host_pointer_pop`. No more JS-
    // driven kernel reboots; bank's cursor + commands input handle
    // the cycle natively, identical across pure-wasm / linux-split /
    // cm5-split.
    function wireDisplayNavigation(el, scenario, surfacesByRole, _playlist) {
      if (!el) return;
      bootKernel(scenario, surfacesByRole, null).catch(err =>
        append(`[boot] ${err.message}`, 'err'));
    }

    function wirePlayerNavigation(el, scenario, surfacesByRole, _playlist) {
      if (!el) return;
      bootKernel(scenario, surfacesByRole, null).catch(err =>
        append(`[boot] ${err.message}`, 'err'));
    }

    // ---------------------------------------------------------------
    // Boot
    // ---------------------------------------------------------------

    // Resolve the playlist for this run. Three sources, tried in
    // order:
    //   1. The bundle's embedded asset bank (`fluxor.assets` custom
    //      section) — preferred when present because it's self-
    //      contained and has no network dependency.
    //   2. `scenario.playlist.source` HTTP listing — the classic
    //      path; used by scenarios that mount a host-FS gallery via
    //      a `list:` binding.
    //   3. Empty — single-asset / headless scenarios fall through
    //      to a boot with no asset URL.
    //
    // The asset bank requires the bundle to already be loaded so the
    // custom section can be read; we pre-warm via loadBundleOnce.
    async function resolvePlaylist(scenario) {
      // Pre-load the bundle so the asset bank is available even if
      // we never end up calling bootKernel (single-asset path).
      await loadBundleOnce(scenario);

      const filter = (scenario.playlist && EXT_FILTERS[scenario.playlist.filter])
        || EXT_FILTERS.any;

      if (bundleAssetBank.size > 0) {
        const names = Array.from(bundleAssetBank.keys()).filter(n => filter.test(n));
        if (names.length === 0) {
          append(`[playlist] asset bank has ${bundleAssetBank.size} entries, none match filter`, 'err');
          return [];
        }
        names.sort();
        append(`[playlist] asset bank → ${names.length} entries`, 'info');
        return names.map(n => `asset://${n}`);
      }

      if (scenario.playlist) {
        return loadPlaylist(scenario.playlist);
      }
      return [];
    }

    // Mount the generic browser-overlay renderer when the scenario
    // carries a `presentation.shell` descriptor. Strictly additive:
    // scenarios without a `shell` block are untouched, and any mount
    // failure is logged, never fatal. The renderer itself lives in
    // browser_overlay_runtime.js, inlined at the end of <body>.
    // Resolve the shell's `lists:` declaration map into the option-row
    // arrays the renderer consumes. Per RFC §17.3 the descriptor's
    // `lists:` only maps a list name to a *feed name* (e.g.
    // `{ queue: "media_queue" }`); the actual rows arrive as a bounded,
    // versioned list-feed snapshot. The renderer iterates
    // `opts.lists[name]` as option rows, so passing the raw declaration
    // (a string) would render one <option> per character. Resolve here:
    //   - an inline array value is taken as-is (simple/test configs);
    //   - an object carrying `options`/`items` uses that array;
    //   - a string is a feed reference, looked up in the current
    //     snapshot source (`window.__fluxor_list_snapshots[feed]` or a
    //     static `presentation.list_data[feed]`), else an empty window
    //     until the feed publishes.
    // Returns a name -> option-row-array map; never a bare string.
    function resolveShellLists(scenario) {
      const presentation = scenario.presentation || {};
      const shell = presentation.shell || {};
      const decls = (shell.lists && typeof shell.lists === 'object') ? shell.lists : null;
      const snapshots = window.__fluxor_list_snapshots || {};
      const staticData = (presentation.list_data && typeof presentation.list_data === 'object')
        ? presentation.list_data : {};
      const out = {};
      if (!decls) return out;
      for (const name of Object.keys(decls)) {
        const decl = decls[name];
        if (Array.isArray(decl)) { out[name] = decl; continue; }
        if (decl && typeof decl === 'object') {
          if (Array.isArray(decl.options)) { out[name] = decl.options; continue; }
          if (Array.isArray(decl.items)) { out[name] = decl.items; continue; }
          out[name] = []; continue;
        }
        if (typeof decl === 'string') {
          const snap = snapshots[decl] || staticData[decl];
          out[name] = Array.isArray(snap) ? snap
            : (snap && Array.isArray(snap.entries)) ? snap.entries : [];
          continue;
        }
        out[name] = [];
      }
      return out;
    }

    function mountOverlayIfPresent(scenario, surfacesByRole) {
      const shell = scenario.presentation && scenario.presentation.shell;
      if (!shell || typeof window.FluxorOverlay === 'undefined') return;
      try {
        const container = document.createElement('div');
        container.id = 'fx-overlay-root';
        container.style.position = 'absolute';
        container.style.inset = '0';
        container.style.pointerEvents = 'none';
        document.body.appendChild(container);
        // Controls capture their own pointer events; the content zone
        // stays click-through so the underlying surface still works.
        const lists = resolveShellLists(scenario);
        window.__fluxor_overlay = window.FluxorOverlay.mount({
          shell: shell,
          browser_overlay: scenario.presentation.browser_overlay,
          lists: lists,
          mountEl: container,
          sinks: window.FluxorOverlay.makeHostSinks(window),
        });
        append('[overlay] presentation.shell mounted (' +
          (shell.media_profile || 'custom') + ')', 'info');
      } catch (e) {
        append('[overlay] mount skipped: ' + e.message, 'err');
      }
    }

    (async () => {
      try {
        const scenario = await loadScenario();
        const surfacesByRole = composeDom(scenario);
        // Player mode (scenarios with `presentation.controls`): build the
        // canvas+controls layout that matches the WebSocket split page and
        // route input. Returns the stage the canvas mounts into; null
        // leaves the generic surface flow untouched.
        playerStage = setupPlayerMode(scenario);
        mountOverlayIfPresent(scenario, surfacesByRole);
        const playlistUrls = await resolvePlaylist(scenario);

        // Hand off to the role-specific navigator. We pick the
        // "primary" surface by role priority: display > player.
        // Future: scenarios can name a primary explicitly via
        // `presentation.primary: <module>`.
        const display = surfacesByRole.get('display');
        const player  = surfacesByRole.get('player');
        if (display) {
          wireDisplayNavigation(display, scenario, surfacesByRole, playlistUrls);
        } else if (player) {
          wirePlayerNavigation(player, scenario, surfacesByRole, playlistUrls);
        } else {
          // Headless wasm — boot once with no asset.
          bootKernel(scenario, surfacesByRole, null).catch(err =>
            append(`[boot] ${err.message}`, 'err'));
        }
      } catch (err) {
        append(`[shell] ${err.message}`, 'err');
        setStatus('shell failed — see log');
      }
    })();
  </script>
  <!--FLUXOR_OVERLAY_RUNTIME-->
</body>
</html>
