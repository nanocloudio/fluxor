# Web Server (Linux hosted) — canonical HTTP / HTTPS / WebSocket demo.
#
# One graph exercises every public surface the `http` + `tls` modules
# offer:
#   /                  — static HTML response (HTTP/1.1)
#   /hello.txt         — file-backed body via the FS_CONTRACT
#                        (linux_fs_dispatch reads /tmp/hello.txt)
#   /ws                — RFC 6455 WebSocket upgrade + echo
#   HTTP/2             — negotiated over TLS via ALPN, or via h2 preface
#                        detection on the bare HTTP port (h2c)
#   TLS 1.3            — pure-Rust tls module wrapped around http
#
# This file replaces the older single-feature examples
# (`http_server`, `http_fs`, `http_synth`, `https_server`,
# `https_multilane`, `h2c_server`, `ws_echo`) — every one of those was
# the same `linux_net ⇄ http` graph with one knob different. Variant
# probes (multi-lane, perf, scripted echo) live under
# `examples/test_harness/linux/web/`.
#
# Setup:
#   echo -n 'hello fs_contract' > /tmp/hello.txt
#   openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:prime256v1 \
#     -nodes -keyout /tmp/server_key.pem -out /tmp/server_cert.pem \
#     -days 365 -subj "/CN=fluxor"
#   openssl x509 -in /tmp/server_cert.pem -outform DER -out /tmp/server_cert.der
#   openssl ec  -in /tmp/server_key.pem  -outform DER -out /tmp/server_key.der
#
# Run:
#   fluxor run examples/web_server/linux.yaml
#
# Probe:
#   # static
#   curl -sk https://localhost:8443/
#   # file-backed body
#   curl -sk https://localhost:8443/hello.txt
#   # HTTP/2 via ALPN
#   curl -vk --http2 https://localhost:8443/
#   # WebSocket round-trip (needs websocat)
#   websocat -k wss://localhost:8443/ws

target: linux
tick_us: 100

platform:
  net: {}

modules:
  - name: tls
    mode: 1
    verify_peer: 0
    cert_file: "/tmp/server_cert.der"
    key_file:  "/tmp/server_key.der"

  - name: http
    port: 8443
    host_tcp: 1
    routes:
      - path: "/"
        body: "<html><body><h1>Fluxor web_server</h1><p>HTTP/1.1, HTTP/2, WebSocket, TLS 1.3, file serving — one graph.</p></body></html>"
      - path: "/hello.txt"
        fs_path: "/tmp/hello.txt"
        content_type: "text/plain"
      - path: "/ws"
        websocket: true

wiring:
  # net ⇄ tls (encrypted side)
  - from: linux_net.net_out
    to: tls.cipher_in
  - from: tls.cipher_out
    to: linux_net.net_in
  # tls ⇄ http (cleartext side)
  - from: tls.clear_out
    to: http.net_in
  - from: http.net_out
    to: tls.clear_in
