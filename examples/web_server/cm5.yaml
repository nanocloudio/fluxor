# Web Server (Pi 5 / CM5 bare-metal) — canonical HTTPS demo.
#
# Same shape as `examples/web_server/linux.yaml` but for the cm5
# bare-metal target: TLS 1.3 over RP1 GEM ethernet with DHCP,
# 100 µs tick for responsive descriptor polling. The fs_path /
# WebSocket routes are linux-only (bare-metal cm5 has no host
# filesystem); the static `/` route and h2 ALPN both work
# identically on both targets.
#
# Setup (on the developer host):
#   openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:prime256v1 \
#     -nodes -keyout /tmp/server_key.pem -out /tmp/server_cert.pem \
#     -days 365 -subj "/CN=fluxor"
#   openssl x509 -in /tmp/server_cert.pem -outform DER -out /tmp/server_cert.der
#   openssl ec  -in /tmp/server_key.pem  -outform DER -out /tmp/server_key.der
#
# Build:
#   make firmware TARGET=cm5 && make modules TARGET=bcm2712
#   fluxor combine -o kernel8.img target/cm5/firmware.bin examples/web_server/cm5.yaml
#
# Probe:
#   curl -vsk https://<DUT_IP>:443/
#   curl -vk  --http2 https://<DUT_IP>:443/

target: cm5
tick_us: 100

platform:
  net: {}

modules:
  - name: tls
    mode: 1
    verify_peer: 0
    cert_file: "/tmp/server_cert.der"
    key_file:  "/tmp/server_key.der"

  - name: http
    port: 443
    routes:
      - path: "/"
        body: "<html><body><h1>Fluxor web_server (Pi 5)</h1><p>HTTP/2, TLS 1.3 — bare metal.</p></body></html>"

wiring:
  - from: ip.net_out
    to: tls.cipher_in
  - from: tls.cipher_out
    to: ip.net_in
  - from: tls.clear_out
    to: http.net_in
  - from: http.net_out
    to: tls.clear_in
