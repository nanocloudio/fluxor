# UART log output (Pi 5 / CM5 bare-metal).
#
# Opt-in kernel-log forwarding to the RP1 PL011 on GPIO14/15 (the
# standard FTDI-cable debug path). No network stack required.
#
# Build:
#   make firmware TARGET=cm5 && make modules TARGET=bcm2712
#   fluxor combine -o kernel8.img target/cm5/firmware.bin examples/cm5/log_uart.yaml
#
# Host capture:
#   tio /dev/ttyUSB0            # or: stty -F /dev/ttyUSB0 115200 raw; cat /dev/ttyUSB0
target: cm5
tick_us: 100

platform:
  debug:
    to: uart
