# Image Viewer — cm5 producer half of the split deployment.
#
# Pairs with `../wasm/image_viewer_thin.yaml` (the browser-side
# canvas) via the inline `scenario:` block below. The cm5 graph
# runs everything except the canvas: bank cycles the FAT32 gallery
# on the cm5's NVMe partition, the unified `codec` module decodes
# any BMP / GIF / PNG / JPEG file, and the http server fans the
# decoded RGB565 frames out to any browser tab that opens
# `/viewer/`. Tap or click on the canvas posts a `next` (primary) or
# `prev` (secondary) FMP command back over the same WebSocket; bank
# advances on the producer side and streams the next image.
#
# Gallery is the FAT32 root on the cm5's NVMe partition (mount label
# `FLUXORNV`). Stage with `fluxor rig test` —
# `tests/hardware/cm5_image_viewer.toml` runs the full end-to-end
# verification (deploy → boot → telemetry pass).
#
# Shape:
#
#   fat32 → bank → codec → ws.tx_out → http.ws_in → browser canvas
#   browser pointer → ws.rx_in → bank.commands  (FMP next/prev)

target: cm5
tick_us: 100

# Inline scenario — `fluxor run examples/cm5/image_viewer.yaml`
# orchestrates this graph plus the thin wasm viewer at `/viewer/`.
# The producer-side cm5 graph is the synthesised scenario's `main`
# component; the wasm thin viewer is the `viewer` companion.
#
# `runtime_override: linux` is the dev-iteration knob — it builds
# and runs the cm5-targeted graph as a linux process on the
# workstation so the bcm2712-compiled PIC modules are exercised
# end-to-end without real silicon. For a real cm5 deployment use
# `fluxor rig test --scenario tests/hardware/cm5_image_viewer.toml`,
# which goes through `build_one` (not the inline-scenario flow) and
# flashes the firmware directly.
scenario:
  name: image_viewer_cm5
  runtime_override: linux
  companions:
    viewer: ../wasm/image_viewer_thin.yaml
  bindings:
    - serve: viewer
      on: main.http
      prefix: /viewer

# Bidirectional feedback at http ↔ ws_stream (WS framing) and
# http ↔ ip (TX-after-RX ack-pacing). The v1 scheduler rejects cycles
# unless the graph opts in.
scheduler:
  accept_cycles: true

platform:
  net: {}
  storage: { media: nvme }
  debug:
    to: net
    monitor: true

modules:
  - name: fat32

  # Directory scan via FS_OPENDIR + FS_READDIR over the FAT32 root.
  # Bank accepts every supported image extension; the codec's
  # detect_format auto-dispatches BMP / GIF / PNG / JPEG from the
  # first stream bytes.
  - name: bank
    dir: "/"
    formats: ".bmp,.gif,.png,.jpg,.jpeg"
    mode: loop
    auto_advance: 0

  # Unified codec — single module for all formats. Output port is
  # `pixels` (VideoRaster, RGB565 LE, scaled to `width × height`).
  - name: codec
    width: 960
    height: 540
    scale_mode: 0
    max_bytes: 8388608

  - name: ws
    type: ws_stream

  - name: http
    port: 9090
    routes:
      - path: "/ws"
        websocket_fanout: true

wiring:
  # Producer: bank → codec → ws → http → browser.
  # `buffer_bytes: 16384` sizes the bank→codec ring big enough that
  # codec's drain phase (~1 MB raster pushed at 1 KB / tick) doesn't
  # stall bank's next-file streaming.
  - from: bank.stream
    to: codec.encoded
    buffer_bytes: 16384
  - from: codec.pixels
    to: ws.tx_in
  - from: ws.tx_out
    to: http.ws_in
    buffer_group: 1

  # Consumer: browser → http → ws → bank.commands (FMP nav).
  - from: http.ws_out
    to: ws.rx_in
    buffer_group: 2
  - from: ws.rx_out
    to: bank.commands

  - from: ip.net_out
    to: http.net_in
  - from: http.net_out
    to: ip.net_in
