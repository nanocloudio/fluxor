# Image Viewer — Waveshare RP2350-Touch-LCD-4, SD-backed.
#
# Same overall shape as the cm5 / linux / wasm variants:
#
#   storage → bank → codec → display
#   input → bank.commands  (cycle next / prev)
#
# Concretely on this board the storage is an SD card on SPI1, the
# display is the ST7701S 480×480 panel, and the input is the BOOTSEL
# button. The chain is `flash_rp → gesture → bank.commands` —
# `flash_rp` is the driver that exposes the button capability (raw
# transitions on out[0]), and `gesture` does click counting + FMP
# mapping (single = next, double = prev). Same chain as every other
# variant; only the driver swaps per platform. The codec
# auto-detects BMP / GIF / PNG / JPEG and emits RGB565 LE.
#
# SD card requirements:
#   * FAT32 (MBR or GPT)
#   * Drop image files under `/images/`
#   * 8.3 short names recommended; long file names are auto-folded
#
# Sibling variants (same interaction model — tap / click / press to
# cycle, single decoder pipeline):
#   examples/image_viewer/waveshare-lcd4-inline.yaml — bake-in test
#                                                     pattern; no SD
#   examples/image_viewer/cm5.yaml                   — cm5 decodes, browser displays
#   examples/image_viewer/linux.yaml                 — linux decodes, browser displays
#   examples/image_viewer/wasm.yaml                  — full browser
target: waveshare-lcd4

hardware:
  spi:
    - bus: 1
      sck: 10
      mosi: 11
      miso: 12

modules:
  # SD card on SPI1 (Waveshare LCD-4 SDIO pins).
  - name: sd
    spi_bus: 1
    cs_pin: 15
    start_block: 0
    block_count: 0

  - name: fat32

  # BOOTSEL driver — exposes the button capability on `raw`.
  - name: flash_rp

  # Click counter + FMP mapper. Single tap = next, double tap = prev.
  # Same `gesture` module the wasm / linux / cm5 variants use.
  - name: gesture
    click: next
    double_click: prev
    triple_click: prev

  - name: bank
    dir: "/images"
    formats: ".bmp,.gif,.png,.jpg,.jpeg"
    mode: loop
    auto_advance: 0

  # Unified codec — auto-detects BMP / GIF / PNG / JPEG from the
  # first bytes and dispatches to the matching sub-codec. Scales the
  # decoded frame to the panel's native 480×480 in RGB565 LE.
  - name: codec
    width: 480
    height: 480
    scale_mode: fit

  - name: st7701s

wiring:
  - from: sd.blocks
    to: fat32.blocks
  - from: bank.stream
    to: codec.encoded
  - from: codec.pixels
    to: st7701s.pixels
  - from: flash_rp.raw
    to: gesture.raw
  - from: gesture.commands
    to: bank.commands
