# Image Viewer — split deployment, wasm thin viewer half.
#
# Browser-side companion to either `examples/image_viewer/linux.yaml`
# or `examples/image_viewer/cm5.yaml`. The shape mirrors the
# producer-half display path exactly: button driver → gesture
# emits FMP commands, the canvas renders incoming raster bytes.
# The only difference vs the pure-wasm version
# (`image_viewer.yaml`) is that `bank` + `codec` live in a
# different kernel, on the other side of the WebSocket.
#
#   wasm_browser_button → gesture → ws.tx_in   ──┐
#                                                │  WS up   /ws  (FMP next/prev)
#                                                ▼
#                                  (producer kernel: linux / cm5)
#                                                │
#                                                │  WS down /ws  (RGB565 bytes)
#   display ←────────────────────── ws.rx_out  ──┘
#
# `wasm_browser_websocket` is the single bidirectional WebSocket
# carrier; tx_in carries OctetStream bytes UP (the gesture
# module's FMP messages), rx_out emits OctetStream bytes DOWN (the
# producer's decoded raster). One socket, two directions, zero
# protocol divergence — the FMP message bytes the browser sends
# are byte-for-byte the same as those bank.commands receives in
# the pure-wasm graph.

target: wasm

presentation:
  layout: stacked
  surfaces:
    - { id: main, role: display, module: display }

modules:
  - name: nav
    type: wasm_browser_button

  # Image-gallery gesture mapping (matches the pure-wasm variant):
  # single tap → next, double tap → prev.
  - name: gesture
    click: next
    double_click: prev
    triple_click: prev

  # Bidirectional WS carrier. tx_in: bytes to send up; rx_out:
  # bytes received from the server. Relative URL — host shim
  # resolves against the page origin so the same graph works on
  # any port (linux split: 9090; cm5 split: 9090).
  - name: ws
    type: wasm_browser_websocket
    url: /ws

  - name: display
    type: wasm_browser_canvas
    width: 960
    height: 540

wiring:
  - from: nav.raw
    to: gesture.raw
  - from: gesture.commands
    to: ws.tx
  - from: ws.rx
    to: display.pixels
