# Hello Server (QEMU virt)
#
# Serves a static HTML page over HTTP via virtio-net on aarch64 QEMU.
#
# Usage:
#   make run CONFIG=examples/qemu-virt/hello_server.yaml
#   curl http://localhost:18080/
target: qemu-virt

platform:
  net: {}

modules:
  - name: http
    port: 80
    routes:
      - path: "/"
        body: "<html><body><h1>Hello from Fluxor!</h1><p>Running on aarch64 QEMU virt.</p></body></html>"

wiring:
  - from: ip.net_out
    to: http.net_in
  - from: http.net_out
    to: ip.net_in
