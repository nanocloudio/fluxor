# Hello (Linux hosted)
#
# Minimal test config: runs the debug module on Linux.
# Proves the runtime loads modules and runs the step loop.
#
# Usage:
#   make linux
#   fluxor generate examples/hello/linux.yaml -o /tmp/hello_config.bin
#   fluxor mktable target/bcm2712/modules --config /tmp/hello_config.bin -o /tmp/hello_modules.bin
#   target/aarch64-unknown-linux-gnu/release/fluxor-linux \
#     --config /tmp/hello_config.bin --modules /tmp/hello_modules.bin
target: linux

modules:
  - name: debug
    mode: plaintext

wiring: []
