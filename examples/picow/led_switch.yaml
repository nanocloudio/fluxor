# LED Switch (Pico W)
#
# Press BOOTSEL to turn LED on, release to turn it off.
#
# Control flow:
#   flash_rp.raw → gesture (mode: direct) → cyw43.led
target: picow


modules:
  - name: pio_rp
  - name: cyw43
  - name: flash_rp
  - name: gesture
    mode: 1                  # direct: on/off tracks button state

wiring:
  - from: flash_rp.raw
    to: gesture.raw
  - from: gesture.commands
    to: cyw43.led
