# Hello Server (Linux hosted)
#
# Serves a static HTML page over HTTP using the Linux socket provider.
# linux_net provides channel-based networking via OS sockets.
#
# Usage:
#   fluxor run examples/linux/hello_server.yaml
#   curl http://localhost:9090/
target: linux

platform:
  net: {}

modules:
  - name: http
    port: 9090
    routes:
      - path: "/"
        body: "<html><body><h1>Hello from Fluxor!</h1><p>Running on Linux.</p></body></html>"

  - name: debug
    mode: plaintext

wiring:
  # HTTP <-> linux_net channel-based networking
  - from: linux_net.net_out
    to: http.net_in
  - from: http.net_out
    to: linux_net.net_in
