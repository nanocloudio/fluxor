      amp_decay_ms: 50
      amp_sustain: 220
      amp_release_ms: 150
      level: 200
      sample_rate: 22050
    effects:
      sample_rate: 22050
      tremolo_rate: 6000
      tremolo_depth: 200
      tremolo_shape: triangle

  # --- Voice 31: Wavefold ---
  # Sine with wavefolding for rich harmonics
  wavefold:
    type: voice
    synth:
      waveform: sine
      pulse_width: 128
      cutoff: 255
      resonance: 20
      env_amount: 40
      filter_attack_ms: 5
      filter_decay_ms: 150
      filter_sustain: 200
      filter_release_ms: 100
      amp_attack_ms: 5
      amp_decay_ms: 80
      amp_sustain: 230
      amp_release_ms: 120
      level: 220
      sample_rate: 22050
    effects:
      sample_rate: 22050
      waveshaper_curve: fold
      waveshaper_amount: 200
      waveshaper_mix: 220


# ============================================================================
# Modules
# ============================================================================

modules:
  # --- BOOTSEL control (flash has built-in gesture detection) ---
  - name: flash_rp
    click: next
    double_click: prev
    long_press: toggle

  # --- Audio chain ---
  - name: sequencer
    mode: ping_pong
    step_ms: 500
    auto_advance_preset: on
    presets: [c_major, c_minor, pentatonic, blues]

  - name: synth
    sample_rate: 8000
    voices: [acid_bass, glass_pad, retro_8bit, ambient, sub_bass,
             synth_demo, vibrato_lead, jet_flanger, robot_voice,
             tape_echo, metallic_bell, lofi_drums, lofi_beats,
             pure_sine, acid_hifi, acid_303]

  - name: effects
    sample_rate: 8000
    voices: [acid_bass, glass_pad, retro_8bit, ambient, sub_bass,
             synth_demo, vibrato_lead, jet_flanger, robot_voice,
             tape_echo, metallic_bell, lofi_drums, lofi_beats,
             pure_sine, acid_hifi, acid_303]

  - name: i2s_pio
    data_pin: 28
    clock_base: 26
    sample_rate: 8000

# ============================================================================
# Wiring
# ============================================================================

wiring:
  # BOOTSEL control: flash emits FMP commands directly
  - from: flash_rp.events
    to: synth.preset
  - from: flash_rp.events
    to: effects.preset

  # Audio chain: sequencer → synth → effects → i2s
  - from: sequencer.notes
    to: synth.notes
  - from: synth.audio
    to: effects.audio
  - from: effects.processed
    to: i2s_pio.audio

# BOOTSEL actions:
#   Click: next voice
#   Double-click: previous voice
#   Long press: toggle play/pause
#
# All 31 voices defined in data section. First 16 loaded into voice tables.
# Remaining voices available by changing the voices: arrays above.
#
# Available voices:
#   acid_bass, glass_pad, retro_8bit, ambient, sub_bass, synth_demo,
#   vibrato_lead, jet_flanger, robot_voice, tape_echo, metallic_bell,
#   lofi_drums, lofi_beats, pure_sine, acid_hifi, acid_303, square_lead,
#   lofi_crunch, combined_saw, delay_echo, analog_bass, distorted_lead,
#   eq_sculpted, gated_pad, granular_atmo, granular_tex, harmony,
#   ring_mod, techno, tremolo_surf, wavefold
