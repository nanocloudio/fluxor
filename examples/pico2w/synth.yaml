# Synth Voice Bank
#
# 31 voice presets, BOOTSEL cycles through voices,
# sequencer auto-advances through melody presets on loop end.
#
# Hardware:
# - BOOTSEL button (no GPIO buttons needed)
# - I2S audio output (data=28, bclk=26, lrclk=27)
#
# Pipeline:
#
#   flash ──→ synth.preset
#         └──→ effects.preset
#   sequencer ──→ synth ──→ effects → i2s
target: pico2w


# ============================================================================
# Data Section: Melodies + Voices
# ============================================================================

data:
  # --- Melodies ---
  c_major:
    type: sequence
    step_ms: 500
    values: [262, 294, 330, 349, 392, 440, 494, 523]

  c_minor:
    type: sequence
    step_ms: 500
    values: [262, 294, 311, 349, 392, 415, 466, 523]

  pentatonic:
    type: sequence
    step_ms: 400
    values: [262, 294, 330, 392, 440]

  blues:
    type: sequence
    step_ms: 450
    values: [262, 311, 349, 370, 392, 466]

  # --- Voice 1: Acid Bass ---
  # Squelchy resonant filter, short decay, portamento
  acid_bass:
    type: voice
    synth:
      waveform: sawtooth
      cutoff: 60
      resonance: 230
      env_amount: 200
      key_track: 80
      filter_attack_ms: 2
      filter_decay_ms: 120
      filter_sustain: 20
      filter_release_ms: 80
      amp_attack_ms: 2
      amp_decay_ms: 150
      amp_sustain: 0
      amp_release_ms: 50
      accent: 150
      glide_ms: 30
      glide_mode: legato
      drive: 80
      level: 200
      sample_rate: 8000
    effects:
      delay_ms: 30
      delay_feedback: 80
      delay_mix: 60
      delay_filter: 150

  # --- Voice 2: Glass Pad ---
  # Shimmering pad with chorus, delay, and reverb
  glass_pad:
    type: voice
    synth:
      waveform: triangle
      cutoff: 120
      resonance: 50
      env_amount: 60
      filter_attack_ms: 300
      filter_decay_ms: 900
      filter_sustain: 120
      filter_release_ms: 800
      amp_attack_ms: 200
      amp_decay_ms: 500
      amp_sustain: 180
      amp_release_ms: 900
      polyphony: 4
      voice_detune_cents: 12
      detune_curve: linear
      lfo_rate: 8
      lfo_depth: 70
      lfo_waveform: sine
      lfo_target: 1
      level: 180
      sample_rate: 8000
    effects:
      chorus_depth_ms: 6
      chorus_rate: 120
      chorus_mix: 120
      delay_ms: 220
      delay_feedback: 100
      delay_mix: 80
      reverb_decay: 220
      reverb_damping: 70
      reverb_predelay_ms: 24
      reverb_mix: 150

  # --- Voice 3: 8-Bit Retro ---
  # Chiptune square wave with bitcrushing
  retro_8bit:
    type: voice
    synth:
      waveform: square
      pulse_width: 128
      cutoff: 200
      resonance: 40
      env_amount: 80
      filter_attack_ms: 1
      filter_decay_ms: 50
      filter_sustain: 100
      filter_release_ms: 30
      amp_attack_ms: 1
      amp_decay_ms: 80
      amp_sustain: 0
      amp_release_ms: 30
      level: 220
      sample_rate: 8000
    effects:
      bitcrush_bits: 8
      bitcrush_rate_div: 4

  # --- Voice 4: Ambient ---
  # Slow evolving pads with phaser and reverb
  ambient:
    type: voice
    synth:
      waveform: triangle
      sub_level: 100
      cutoff: 100
      resonance: 60
      env_amount: 50
      key_track: 50
      filter_attack_ms: 300
      filter_decay_ms: 800
      filter_sustain: 100
      filter_release_ms: 600
      amp_attack_ms: 200
      amp_decay_ms: 400
      amp_sustain: 160
      amp_release_ms: 800
      glide_ms: 80
      glide_mode: always
      level: 180
      polyphony: 3
      lfo_rate: 10
      lfo_depth: 80
      lfo_waveform: sine
      lfo_target: 1
      sample_rate: 8000
    effects:
      phaser_rate: 200
      phaser_depth: 150
      phaser_feedback: 100
      phaser_stages: 6
      phaser_mix: 90
      reverb_decay: 240
      reverb_damping: 60
      reverb_predelay_ms: 30
      reverb_mix: 140

  # --- Voice 5: Sub Bass ---
