# USB CDC log output (pico2w).
#
# Opt-in kernel-log forwarding over USB CDC-ACM. The embassy USB task in
# the kernel drains an internal pipe that log_usb pushes via the
# USB_WRITE_RAW syscall. Plug the board into a host USB port and open
# /dev/ttyACMn with any terminal program.
#
# Build + flash:
#   make firmware TARGET=rp2350    (or TARGET=rp2040 / rp2350a)
#   make modules TARGET=rp2350
#   fluxor combine -o image.uf2 target/rp2350/firmware.uf2 examples/pico2w/log_usb.yaml
#   # copy image.uf2 to the board's BOOTSEL drive
#
# Host capture:
#   stty -F /dev/ttyACM0 115200 raw -echo && cat /dev/ttyACM0
#   # or: fluxor monitor --port /dev/ttyACM0
target: pico2w
tick_us: 100

platform:
  debug:
    to: usb
