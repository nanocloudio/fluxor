# LED Switch (Pico 2 W)
#
# Press BOOTSEL to turn LED on, release to turn it off.
#
# Control flow:
#   flash_rp.raw → gesture (mode: direct) → cyw43.led
#
# `gesture` in direct mode maps 0x01→MSG_ON, 0x00→MSG_OFF — same
# FMP verbs cyw43.led expects. Decoupled architecture: flash_rp
# exposes the button capability; gesture interprets it.
target: pico2w


modules:
  - name: pio_rp
  - name: cyw43
  - name: flash_rp
  - name: gesture
    mode: 1                  # direct: on/off tracks button state

wiring:
  - from: flash_rp.raw
    to: gesture.raw
  - from: gesture.commands
    to: cyw43.led
