# Audio Player â€” inline / no-storage (Raspberry Pi Pico 2 W)
#
# Four musical-scale sequences baked into config; cycle with the
# button. No SD card required â€” useful as an IÂ˛S bring-up sanity
# check that proves the synth â†’ mixer â†’ i2s_pio path end-to-end
# without any FS dependency.
#
# Interaction:
#   button single click â†’ toggle play/pause
#   button double click â†’ next preset
#   button triple click â†’ previous preset
#
# Pipeline:
#   button.raw â”€â†’ gesture.raw â”€â†’ gesture.commands â”€â†’ bank.files
#   bank.stream â”€â†’ sequencer.control
#   sequencer.notes â”€â†’ synth.audio â”€â†’ i2s_pio.audio
#
# Sibling variants (same interaction, real audio files):
#   examples/audio_player/pico2w.yaml         â€” SD card
#   examples/audio_player/cm5-split.yaml      â€” pi5 decodes, browser plays
#   examples/audio_player/wasm.yaml           â€” full browser
target: pico2w

# Inline sequence presets resolved at config-build time and embedded
# directly into the sequencer's module params.
data:
  c_major:
    type: sequence
    step_ms: 500
    values: [262, 294, 330, 349, 392, 440, 494, 523]  # C4 â†’ C5

  c_minor:
    type: sequence
    step_ms: 500
    values: [262, 294, 311, 349, 392, 415, 466, 523]  # C minor

  pentatonic:
    type: sequence
    step_ms: 400
    values: [262, 294, 330, 392, 440]                 # C pentatonic

  blues:
    type: sequence
    step_ms: 450
    values: [262, 311, 349, 370, 392, 466]            # Blues

modules:
  - name: button
    pin: 21
    control_id: 0
    active_low: 1
    pull: up

  # Defaults: singleâ†’toggle, doubleâ†’next, tripleâ†’prev.
  - name: gesture
    multi_click_ms: 300
    long_press_ms: 500

  - name: bank
    item_count: 4              # matches preset count
    mode: loop
    initial_index: 0

  - name: sequencer
    mode: ping_pong
    step_ms: 500
    presets: [c_major, c_minor, pentatonic, blues]

  - name: synth
    sample_rate: 8000
    waveform: sine
    level: 128
    cutoff: 255
    resonance: 0
    env_amount: 0
    key_track: 0
    filter_attack_ms: 0
    filter_decay_ms: 0
    filter_sustain: 255
    filter_release_ms: 0
    amp_attack_ms: 1
    amp_decay_ms: 0
    amp_sustain: 255
    amp_release_ms: 10

  - name: pio_rp
  - name: i2s_pio
    data_pin: 28
    clock_base: 26
    sample_rate: 8000

wiring:
  - from: button.raw
    to: gesture.raw
  - from: gesture.commands
    to: bank.files
  - from: bank.stream
    to: sequencer.control
  - from: sequencer.notes
    to: synth.notes
  - from: synth.audio
    to: i2s_pio.audio
