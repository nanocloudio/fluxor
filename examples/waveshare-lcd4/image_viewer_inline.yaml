modules:
  # Flash provides two inline BMP blobs (on `stream`) and the
  # BOOTSEL button capability (raw transitions on `raw`).
  - name: flash_rp
    presets: [color_diag_8x8, color_diag_32x32]

  # Click counter + FMP mapper. Same `gesture` module every other
  # variant uses.
  - name: gesture
    click: next
    double_click: prev
    triple_click: prev

  # Bank cycles the preset list. file_count=2 matches presets length.
  - name: bank
    file_count: 2
    mode: loop
    auto_advance: 0

  # Codec stretches input width → 480. Native source height (8 or 32)
  # is preserved; st7701s row_lookup handles the vertical scale to 480.
  - name: codec
    width: 480
    height: 32
    scale_mode: stretch

  - name: st7701s

wiring:
  - from: flash_rp.stream
    to: bank.files
  - from: bank.stream
    to: codec.encoded
  - from: codec.pixels
    to: st7701s.pixels
  - from: flash_rp.raw
    to: gesture.raw
  - from: gesture.commands
    to: bank.commands
