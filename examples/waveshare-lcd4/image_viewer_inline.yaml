# Image Viewer — Waveshare RP2350-Touch-LCD-4, inline test patterns.
#
# Same shape as `image_viewer.yaml` minus the SD card: two BMP test
# patterns baked into flash, BOOTSEL gestures cycle them. Useful as
# a board bring-up sanity check — proves the codec → ST7701S path
# end-to-end without any FS dependency.
#
# Pattern: 8-colour diagonal stripes (R G B C M Y K W) at two source
# resolutions (8×8 and 32×32). The codec stretches horizontally; the
# panel's row_lookup stretches vertically. Both patterns render
# pixel-identical at 480×480 — switching between them exercises the
# bank → codec hand-off, not the pattern itself.
#
# Sibling variants (same overall shape, real image sources):
#   examples/waveshare-lcd4/image_viewer.yaml — SD card
#   examples/cm5/image_viewer.yaml            — cm5 decodes, browser displays
#   examples/linux/image_viewer.yaml          — linux decodes, browser displays
#   examples/wasm/image_viewer.yaml           — full browser
target: waveshare-lcd4

data:
  color_diag_8x8:
    type: blob
    # 8×8 24-bit BMP: diagonal colour pattern (246 bytes)
    # BMP header (14) + DIB header (40) + pixel data (192)
    # Height is -8 (0xFFFFFFF8 LE) for top-down row order (streaming-friendly)
    # Colours: R G B C M Y K W — BMP stores BGR888
    hex: >-
      424df600000000000000360000002800000008000000
      f8ffffff0100180000000000c000000000000000000000000000000000000000
      0000ff00ff00ff0000ffff00ff00ff00ffff000000ffffff
      00ff00ff0000ffff00ff00ff00ffff000000ffffff0000ff
      ff0000ffff00ff00ff00ffff000000ffffff0000ff00ff00
