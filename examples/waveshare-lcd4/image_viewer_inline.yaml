      00ffff000000ffffff0000ff00ff00ff0000ffff00ff00ff
      000000ffffff0000ff00ff00ff0000ffff00ff00ff00ffff
      ffffff0000ff00ff00ff0000ffff00ff00ff00000000ffff

  color_diag_32x32:
    type: blob
    # 32×32 24-bit BMP: same pattern at 4px per band (3126 bytes)
    # When stretched to 480×480 the two patterns are pixel-identical;
