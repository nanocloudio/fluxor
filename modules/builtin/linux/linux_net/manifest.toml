version = "1.0.0"
hardware_targets = ["linux"]
builtin = true

[[ports]]
name = "net_out"
direction = "output"
content_type = "NetProto"

[[ports]]
name = "net_in"
direction = "input"
content_type = "NetProto"

# Module-scope observability — exempt (see standards/observability.md §6).
[observability]
exempt = "Linux-host TCP/IP adapter — dev/test substitute for the silicon ip stack; host-side throughput is observed via the host OS (ss/netstat) and at the instrumented stream modules above it"
