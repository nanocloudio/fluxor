version = "1.0.0"
hardware_targets = ["linux"]
builtin = true

[[ports]]
name = "encoded"
direction = "input"
content_type = "OctetStream"
required = true

[[ports]]
name = "pixels"
direction = "output"
content_type = "VideoRaster"
required = true

[[params]]
name = "width"
type = "u32"
default = 480
range = [1, 4096]

[[params]]
name = "height"
type = "u32"
default = 480
range = [1, 4096]

[[params]]
name = "scale_mode"
type = "enum"
values = ["fit", "stretch"]
default = "fit"

[[params]]
name = "max_bytes"
type = "u32"
default = 4194304
range = [1024, 67108864]

# Module-scope observability — exempt (see standards/observability.md §6).
[observability]
exempt = "host-side dev/test provider — runs on the build host, observed via host tooling, not part of the on-silicon data path"
