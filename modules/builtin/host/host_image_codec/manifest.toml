version = "1.0.0"
hardware_targets = ["linux"]
builtin = true

[[ports]]
name = "encoded"
direction = "input"
content_type = "OctetStream"
required = true

[[ports]]
name = "pixels"
direction = "output"
content_type = "ImageRaw"
required = true

[[params]]
name = "width"
type = "u32"
default = 480
range = [1, 4096]

[[params]]
name = "height"
type = "u32"
default = 480
range = [1, 4096]

[[params]]
name = "scale_mode"
type = "enum"
values = ["fit", "stretch"]
default = "fit"

[[params]]
name = "max_bytes"
type = "u32"
default = 4194304
range = [1024, 67108864]
