version = "1.0.0"
hardware_targets = ["wasm"]
builtin = true

# Browser audio sink. Consumes `AudioSample` (signed 16-bit PCM)
# blocks on the input port and forwards them to the host shim's
# `host_audio_play` import, which schedules playback through
# WebAudio.
#
# Wire format: signed 16-bit interleaved PCM at the configured
# sample rate. The shim handles WebAudio context unlock (user
# gesture required) and i16 → f32 conversion.

[[ports]]
# Named `audio` for cross-platform consistency — same port name as
# `linux_audio.audio`, `i2s_pio.audio`, and `mixer.audio`. Any
# upstream `codec.audio` (or `mixer.mixed`) drops in unchanged.
name = "audio"
direction = "input"
content_type = "AudioSample"
required = true

[[params]]
name = "sample_rate"
type = "u32"
required = true

[[params]]
name = "channels"
type = "u8"
default = 1

# Module-scope observability — exempt (see standards/observability.md §6).
[observability]
exempt = "browser-API shim (wasm) — observed via browser devtools; carries input events / media samples / canvas rasters / WS frames, not a measurable on-device byte stream"
