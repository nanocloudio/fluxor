version = "1.0.0"
hardware_targets = ["wasm"]
builtin = true

# Browser canvas raster sink. Consumes `VideoRaster` frames on the
# input port and presents them to a `<canvas>` element through the
# host shim's `host_canvas_present` import.
#
# Pixel format is RGB565 little-endian (matches `st7701s` and
# `linux_display`). Other formats are added by extending the host
# import.

# Truthful AV capabilities, parallel to `linux_display` / `st7701s`
# (RFC browser_overlay §5.7): a paced raster present surface. Lets the
# `display` platform stack resolve a wasm variant and lets cross-target
# graph-shape checks treat all three display sinks interchangeably.
capabilities = ["video.raster", "display.scanout", "presentation.clock"]

# Logical sink port `pixels` — uniform with `linux_display.pixels` and
# `st7701s.pixels`, so `<producer>.pixels -> display.pixels` resolves on
# every target (RFC §5.7). The kernel resolves this builtin's input by
# port index, so the rename is a wiring-name change only.
[[ports]]
name = "pixels"
direction = "input"
content_type = "VideoRaster"
required = true

[[params]]
name = "width"
type = "u16"
required = true

[[params]]
name = "height"
type = "u16"
required = true

# Module-scope observability — exempt (see standards/observability.md §6).
[observability]
exempt = "browser-API shim (wasm) — observed via browser devtools; carries input events / media samples / canvas rasters / WS frames, not a measurable on-device byte stream"
