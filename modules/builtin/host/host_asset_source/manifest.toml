version = "1.0.0"
hardware_targets = ["linux"]
builtin = true

[[ports]]
name = "stream"
direction = "output"
content_type = "OctetStream"
required = true

[[params]]
name = "path"
type = "str"
required = true

# Module-scope observability — exempt (see standards/observability.md §6).
[observability]
exempt = "host-side dev/test provider — runs on the build host, observed via host tooling, not part of the on-silicon data path"
