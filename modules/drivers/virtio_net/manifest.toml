version = "1.0.0"
hardware_targets = ["bcm2712"]

[[ports]]
name = "frames_tx"
direction = "input"
content_type = "EthernetFrame"

[[ports]]
name = "frames_rx"
direction = "output"
content_type = "EthernetFrame"
required = true

# Module-scope observability — exempt (see standards/observability.md §6).
[observability]
exempt = "L2 frame DMA shim — wire-byte throughput is observed at the ip module that consumes/produces these frames"
