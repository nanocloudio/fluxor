version = "1.0.0"
hardware_targets = ["rp2350"]
# I2S DMA is the canonical sink-authored clock for rp2350 audio playback.
capabilities = ["audio.sample", "presentation.clock"]

[[ports]]
name = "audio"
direction = "input"
content_type = "AudioSample"
required = true

[[resources]]
requires_contract = "pio"
access = "exclusive"
instance = 0

[[resources]]
requires_contract = "gpio"
access = "write"

# Module-scope observability — exempt (see standards/observability.md §6).
[observability]
exempt = "audio/media-sample path — meaningful throughput is sample-rate (Hz·channels), not byte count; off-device bytes are observed at the network transport"
