version = "1.0.0"
hardware_targets = ["rp2350"]

[[ports]]
name = "net_tx"
direction = "input"
content_type = "OctetStream"

[[ports]]
name = "net_rx"
direction = "output"
content_type = "OctetStream"
required = true

[[ports]]
name = "netif_state"
index = 1
direction = "output"
content_type = "FmpMessage"

[[resources]]
requires_contract = "uart"
access = "exclusive"

[[resources]]
requires_contract = "gpio"
access = "write"
