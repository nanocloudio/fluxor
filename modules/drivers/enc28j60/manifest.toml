version = "1.0.0"
hardware_targets = ["rp2350"]

[[ports]]
name = "frames_tx"
direction = "input"
content_type = "EthernetFrame"

[[ports]]
name = "frames_rx"
direction = "output"
content_type = "EthernetFrame"
required = true

[[resources]]
requires_contract = "spi"
access = "exclusive"

[[resources]]
requires_contract = "gpio"
access = "write"
