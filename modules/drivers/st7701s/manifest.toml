version = "1.0.0"
hardware_targets = ["rp2350"]
permissions = ["platform_raw"]
# DSI/PIO panel scanout: paced sink, owns the display refresh timeline so
# it qualifies as a `presentation.clock` for solo display groups.
capabilities = ["video.raster", "video.scanout", "display.scanout", "presentation.clock"]

[[ports]]
name = "pixels"
direction = "input"
content_type = "VideoRaster"
required = false

[[resources]]
requires_contract = "gpio"
access = "write"

[[resources]]
requires_contract = "pio"
access = "exclusive"

[[resources]]
requires_contract = "timer"
access = "write"

[[resources]]
requires_contract = "platform_dma_fd"
access = "exclusive"
