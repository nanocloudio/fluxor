version = "1.0.0"
hardware_targets = ["rp2350", "bcm2712"]

[[ports]]
name = "frames_rx"
direction = "input"
content_type = "EthernetFrame"
required = true

[[ports]]
name = "frames_tx"
direction = "output"
content_type = "EthernetFrame"
required = true

[[ports]]
name = "net_out"
direction = "output"
content_type = "OctetStream"

[[ports]]
name = "net_in"
direction = "input"
content_type = "OctetStream"

[[resources]]
device_class = "netif"
access = "write"
