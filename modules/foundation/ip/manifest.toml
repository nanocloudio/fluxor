version = "1.0.0"
hardware_targets = ["rp2350", "bcm2712"]

[[ports]]
name = "frames_rx"
direction = "input"
content_type = "EthernetFrame"
required = true

[[ports]]
name = "frames_tx"
direction = "output"
content_type = "EthernetFrame"
required = true

[[ports]]
name = "net_out"
direction = "output"
content_type = "NetProto"

[[ports]]
name = "net_in"
direction = "input"
content_type = "NetProto"

# Module-scope observability. Optional 3rd output (out[2]); wired to
# `observe.telemetry` when the debug stack's observe overlay is on. Emits
# cumulative counters; no-op when unwired. See standards/observability.md.
[[ports]]
name = "telemetry"
direction = "output"
content_type = "Telemetry"

[observability]
metrics = ["bytes_in", "bytes_out"]
