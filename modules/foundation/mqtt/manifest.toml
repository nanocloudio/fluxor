version = "2.0.0"
hardware_targets = ["rp2350"]

[[ports]]
name = "net_in"
direction = "input"
content_type = "OctetStream"

[[ports]]
name = "mesh_rx"
index = 1
direction = "input"
content_type = "OctetStream"

[[ports]]
name = "net_out"
direction = "output"
content_type = "OctetStream"

[[ports]]
name = "mesh_tx"
index = 1
direction = "output"
content_type = "OctetStream"

[[resources]]
device_class = "channel"
access = "read"
