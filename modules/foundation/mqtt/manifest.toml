version = "2.0.0"
# timer_class: keepalive/reconnect timers read wall-clock (dev_millis).
timer_class = "wall_clock"
hardware_targets = ["rp2350"]

[[ports]]
name = "net_in"
direction = "input"
content_type = "NetProto"

[[ports]]
name = "mesh_rx"
index = 1
direction = "input"
content_type = "OctetStream"

[[ports]]
name = "net_out"
direction = "output"
content_type = "NetProto"

[[ports]]
name = "mesh_tx"
index = 1
direction = "output"
content_type = "OctetStream"

# Module-scope observability. Optional 3rd output (out[2]); wired to
# `observe.telemetry` when the debug stack's observe overlay is on. Emits
# cumulative byte counters; no-op when unwired. See standards/observability.md.
[[ports]]
name = "telemetry"
index = 2
direction = "output"
content_type = "Telemetry"

[observability]
metrics = ["bytes_in", "bytes_out"]

[[resources]]
requires_contract = "channel"
access = "read"
