version = "2.0.0"
hardware_targets = ["rp2350"]

# Audio file streamer + navigation. Opens files via the FS_CONTRACT
# (`fat32` on bare-metal, `linux_fs_dispatch` on the host) using
# `path_*` params; cycles between them in response to `next`/`prev`/
# `select` FMP commands.

[[ports]]
name = "stream"
direction = "output"
content_type = "OctetStream"
required = true

[[ports]]
name = "notify"
index = 1
direction = "output"
content_type = "FmpMessage"

[[ports]]
name = "commands"
direction = "ctrl_input"
content_type = "FmpMessage"

[[resources]]
requires_contract = "fs"
access = "read"

[commands]
accepts = ["next", "prev", "toggle", "select"]
emits = ["status"]
