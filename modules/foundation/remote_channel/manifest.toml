version = "1.0.0"
hardware_targets = ["rp2350", "bcm2712", "linux", "wasm"]

# Remote-channel multiplexer.
#
# Multiplexes up to 4 logical Fluxor channels onto a single byte
# transport. Pairs naturally with `wasm_browser_websocket` (browser-
# WASM-Fluxor peer) or with `foundation/http`'s WebSocket fan-out
# (server side), but works over any byte transport — TCP via
# `net_proto`, a serial link, a custom UART tunnel, etc.
#
# Wire format per frame:
#   [magic: u8 = 0xFC][channel_id: u8][len_lo: u8][len_hi: u8][payload]
#
# Magic is a sync sentinel for resync after a parse error. Channel id
# 0..3 corresponds to the local port pairs `ch0`/`ch0_rx` ..
# `ch3`/`ch3_rx`. Frames that don't match the magic are dropped at
# the framer's discretion (in practice the framer realigns on the
# next 0xFC byte).

# Outbound: per-channel inputs (data going *out* to the remote peer).
[[ports]]
name = "ch0"
direction = "input"
content_type = "OctetStream"

[[ports]]
name = "ch1"
direction = "input"
content_type = "OctetStream"

[[ports]]
name = "ch2"
direction = "input"
content_type = "OctetStream"

[[ports]]
name = "ch3"
direction = "input"
content_type = "OctetStream"

# Inbound: per-channel outputs (data coming *in* from the remote peer).
[[ports]]
name = "ch0_rx"
direction = "output"
content_type = "OctetStream"

[[ports]]
name = "ch1_rx"
direction = "output"
content_type = "OctetStream"

[[ports]]
name = "ch2_rx"
direction = "output"
content_type = "OctetStream"

[[ports]]
name = "ch3_rx"
direction = "output"
content_type = "OctetStream"

# Transport: framed bytes flow through here.
[[ports]]
name = "transport_rx"
direction = "input"
content_type = "OctetStream"

[[ports]]
name = "transport_tx"
direction = "output"
content_type = "OctetStream"
