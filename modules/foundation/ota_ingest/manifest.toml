version = "1.0.0"
hardware_targets = ["rp2350", "rp2040"]

[[ports]]
name = "stream"
direction = "input"
content_type = "OctetStream"
required = true

[[ports]]
name = "status"
direction = "output"
content_type = "OctetStream"

# Module-scope observability — exempt (see standards/observability.md §6).
[observability]
exempt = "firmware-image ingest — emits its own progress status records (kind/offset/byte_count) on the status port; a generic byte counter would duplicate that domain telemetry"
