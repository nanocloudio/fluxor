version = "1.0.0"
hardware_targets = ["bcm2712"]

# EL0 isolated transform module — proves the SVC #1 channel-syscall gateway
# (channel_read / channel_write / channel_poll) end to end. Runs at EL0 under
# its own page table when wired with `protection: isolated`, doing real
# channel I/O via mediated syscalls with no access to kernel memory. REQUIRES
# `protection: isolated` (run non-isolated, its `svc #1` has no EL1 handler).
# Diagnostic/demonstration — not loaded by production configs. See
# docs/architecture/cm5_el0_isolation.md.
