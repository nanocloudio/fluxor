version = "2.0.0"
hardware_targets = ["rp2350", "bcm2712"]

[[ports]]
name = "net_in"
direction = "input"
content_type = "OctetStream"

[[ports]]
name = "variables"
index = 1
direction = "input"
content_type = "FmpMessage"

[[ports]]
name = "file_data"
index = 2
direction = "input"
content_type = "OctetStream"

[[ports]]
name = "net_out"
direction = "output"
content_type = "OctetStream"

[[ports]]
name = "file_ctrl"
index = 1
direction = "output"
content_type = "OctetStream"

# WebSocket fan-out — populated only when a route uses
# HANDLER_WEBSOCKET_FANOUT (handler value 5). On such routes the upgraded
# connection's frames are routed externally as WsFrame records on these
# ports instead of being echoed internally. Routes that use the existing
# HANDLER_WEBSOCKET (4) ignore these channels and keep echoing.
[[ports]]
name = "ws_out"
index = 2
direction = "output"
content_type = "WsFrame"

[[ports]]
name = "ws_in"
index = 3
direction = "input"
content_type = "WsFrame"

[[resources]]
requires_contract = "channel"
access = "read"

# HANDLER_FS_FILE routes serve files by path through the FS_CONTRACT
# (`fat32` on bare-metal, `linux_fs_dispatch` on the host). Granting
# `fs` enables `provider_call(-1, FS_OPEN, ...)`.
[[resources]]
requires_contract = "fs"
access = "read"
