version = "1.0.0"
hardware_targets = ["bcm2712", "rp2350"]

[[ports]]
name = "frames_rx"
direction = "input"
content_type = "EthernetFrame"
required = true

[[ports]]
name = "lane_0"
direction = "output"
content_type = "EthernetFrame"
required = true

[[ports]]
name = "lane_1"
direction = "output"
content_type = "EthernetFrame"
required = true

# Module-scope observability — exempt (see standards/observability.md §6).
[observability]
exempt = "L2 pass-through filter/fan-out — frame bytes are observed at the ip module; its domain metric is pass/drop counts"
