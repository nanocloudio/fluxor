version = "1.0.0"
hardware_targets = ["bcm2712", "rp2350", "rp2040"]
permissions = ["platform_raw"]
# Cadence-independent telemetry forwarder (drains the log ring → UDP); its emit
# cadence is cosmetic, not correctness-bearing. Explicit attestation to run on a
# mechanism-(b) domain (RFC adaptive_tick §8 rule 2 — absent = unattested =
# blocked on (b)). This is one of the §7.6 foundation modules scoped for the
# attestation pass.
timer_class = "agnostic"

[[ports]]
name = "net_in"
direction = "input"
content_type = "NetProto"
required = true

[[ports]]
name = "net_out"
direction = "output"
content_type = "NetProto"
required = true

# Module-scope observability — exempt (see standards/observability.md §6).
[observability]
exempt = "telemetry/log exporter or collector — forwards records, originates none (cf. otlp_http / otel_udp_sample)"
