version = "1.0.0"
hardware_targets = ["bcm2712", "rp2350", "rp2040"]

[[ports]]
name = "net_in"
direction = "input"
content_type = "OctetStream"
required = true

[[ports]]
name = "net_out"
direction = "output"
content_type = "OctetStream"
required = true

[[resources]]
device_class = "socket"
access = "write"
