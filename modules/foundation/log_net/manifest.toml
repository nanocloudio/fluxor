version = "1.0.0"
hardware_targets = ["bcm2712", "rp2350", "rp2040"]
permissions = ["platform_raw"]

[[ports]]
name = "net_in"
direction = "input"
content_type = "NetProto"
required = true

[[ports]]
name = "net_out"
direction = "output"
content_type = "NetProto"
required = true

# Module-scope observability — exempt (see standards/observability.md §6).
[observability]
exempt = "telemetry/log exporter or collector — forwards records, originates none (cf. otlp_http / otel_udp_sample)"
