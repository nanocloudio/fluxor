version = "1.0.0"
hardware_targets = ["bcm2712", "rp2350"]
# Cadence-independent SYN/connection filter pass-through; no tick-based timing.
# Explicit attestation to run on a mechanism-(b) domain (RFC adaptive_tick §8
# rule 2 — an absent declaration is unattested → blocked on (b)).
timer_class = "agnostic"

[[ports]]
name = "frames_rx"
direction = "input"
content_type = "EthernetFrame"
required = true

[[ports]]
name = "frames_tx"
direction = "output"
content_type = "EthernetFrame"
required = true

# Module-scope observability — exempt (see standards/observability.md §6).
[observability]
exempt = "L2 pass-through filter/fan-out — frame bytes are observed at the ip module; its domain metric is pass/drop counts"
