version = "2.0.0"
# timer_class: query timeout reads wall-clock (dev_millis).
timer_class = "wall_clock"
hardware_targets = ["rp2350", "bcm2712"]

[[ports]]
name = "net_in"
direction = "input"
content_type = "NetProto"

[[ports]]
name = "net_out"
direction = "output"
content_type = "NetProto"

# Module-scope observability. Optional 2nd output (out[1]); wired to
# `observe.telemetry` when the debug stack's observe overlay is on. Emits
# cumulative byte counters; no-op when unwired. See standards/observability.md.
[[ports]]
name = "telemetry"
index = 1
direction = "output"
content_type = "Telemetry"

[observability]
metrics = ["bytes_in", "bytes_out"]
# Span 0: one `dns.query` span per locally-resolved query (parse -> reply),
# SERVER kind, rooting its own trace (DNS-over-UDP carries no inbound context).
# Minted only when the telemetry port is wired and the query is head-sampled
# (zero-cost otherwise). Forwarded/upstream queries are not spanned (their
# latency is the upstream resolver's).
spans = ["dns.query"]

[[resources]]
requires_contract = "channel"
access = "read"
