version = "1.0.0"
hardware_targets = ["rp2350"]

[[ports]]
name = "source"
direction = "input"
content_type = "OctetStream"
required = true

[[ports]]
name = "level"
direction = "output"
content_type = "OctetStream"
required = true

# Module-scope observability — exempt (see standards/observability.md §6).
[observability]
exempt = "GPIO sensor/actuator — emits state-change events, no sustained byte stream"
