version = "1.0.0"
hardware_targets = ["rp2350"]

[[ports]]
name = "audio_in"
direction = "input"
content_type = "AudioSample"

[[ports]]
name = "audio_out"
direction = "output"
content_type = "AudioSample"

[[ports]]
name = "ctrl_fwd"
direction = "output"
content_type = "FmpMessage"

[[ports]]
name = "control"
direction = "ctrl_input"
content_type = "FmpMessage"

[[resources]]
requires_contract = "uart"
access = "exclusive"
