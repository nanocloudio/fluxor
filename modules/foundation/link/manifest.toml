version = "1.0.0"
hardware_targets = ["rp2350"]

[[ports]]
name = "audio_in"
direction = "input"
content_type = "AudioSample"

[[ports]]
name = "audio_out"
direction = "output"
content_type = "AudioSample"

[[ports]]
name = "ctrl_fwd"
direction = "output"
content_type = "FmpMessage"

[[ports]]
name = "control"
direction = "ctrl_input"
content_type = "FmpMessage"

[[resources]]
requires_contract = "uart"
access = "exclusive"

# Module-scope observability — exempt (see standards/observability.md §6).
[observability]
exempt = "audio/media-sample path — meaningful throughput is sample-rate (Hz·channels), not byte count; off-device bytes are observed at the network transport"
