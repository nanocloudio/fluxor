version = "1.0.0"
hardware_targets = ["rp2350"]

[[ports]]
name = "mqtt_rx"
direction = "input"
content_type = "OctetStream"
required = true

[[ports]]
name = "notify"
index = 1
direction = "input"
content_type = "FmpMessage"

[[ports]]
name = "mqtt_tx"
direction = "output"
content_type = "OctetStream"
required = true

[[ports]]
name = "commands"
direction = "ctrl_output"
content_type = "FmpMessage"

[commands]
accepts = ["status"]
emits = ["next", "prev", "toggle", "select"]

# Module-scope observability — exempt (see standards/observability.md §6).
[observability]
exempt = "channel-bridge fabric — byte throughput is observed at its wired transport endpoints"
