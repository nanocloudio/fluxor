version = "1.0.0"
# Cross-platform — pure logic; consumes raw button transitions
# (modules/sdk/contracts/input/button.rs) and emits FMP. Producers
# differ per target: `button` on rp (GPIO + BOOTSEL); `pointer_to_button`
# anywhere a `pointer` capability is available (wasm, future linux/cm5).
hardware_targets = ["rp2350", "bcm2712", "wasm", "linux"]

[[ports]]
name = "raw"
direction = "input"
content_type = "OctetStream"
required = true

[[ports]]
name = "commands"
direction = "output"
content_type = "FmpMessage"
required = true

[commands]
emits = ["next", "prev", "toggle", "select", "long_press", "on", "off"]
