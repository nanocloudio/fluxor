version = "1.0.0"
hardware_targets = ["rp2350"]

[[ports]]
name = "raw"
direction = "input"
content_type = "OctetStream"
required = true

[[ports]]
name = "commands"
direction = "output"
content_type = "FmpMessage"
required = true

[commands]
emits = ["next", "prev", "toggle", "select", "long_press", "on", "off"]
