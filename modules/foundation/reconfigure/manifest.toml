version = "1.0.0"
# timer_class: drain window counts scheduler ticks as ms (elapsed vs drain_timeout_ms); warps under a variable cadence — keep off adaptive domains until migrated to dev_millis (RFC adaptive_tick §7.6).
timer_class = "tick_counted"
hardware_targets = ["rp2350", "rp2040", "bcm2712"]
permissions = ["reconfigure", "monitor"]

[[ports]]
name = "trigger"
direction = "input"
content_type = "OctetStream"
required = true

[[ports]]
name = "status"
direction = "output"
content_type = "OctetStream"

# Module-scope observability — exempt (see standards/observability.md §6).
[observability]
exempt = "control-plane module (FMP/config) — applies discrete messages, not a sustained byte data path"
