version = "1.0.0"
hardware_targets = ["rp2350", "bcm2712", "linux"]

# Stream Surface v1 (net_proto) channel from the IP module / linux_net.
[[ports]]
name = "net_in"
direction = "input"
content_type = "OctetStream"

# SessionCtrlV1 replies from the worker.
[[ports]]
name = "ctrl_in"
index = 1
direction = "input"
content_type = "OctetStream"

# Processed byte stream from the worker (to send back to client).
[[ports]]
name = "data_in"
index = 2
direction = "input"
content_type = "OctetStream"

# Stream Surface v1 commands to the IP module / linux_net.
[[ports]]
name = "net_out"
direction = "output"
content_type = "OctetStream"

# SessionCtrlV1 commands to the worker.
[[ports]]
name = "ctrl_out"
index = 1
direction = "output"
content_type = "OctetStream"

# Raw byte stream to the worker (bytes from client).
[[ports]]
name = "data_out"
index = 2
direction = "output"
content_type = "OctetStream"

[[resources]]
requires_contract = "channel"
access = "read"
