version = "1.0.0"
# Logic is platform-agnostic (timer + preset lookup with a millis
# fallback for the frame-accurate path). Available on hosts and
# bare-metal targets that load PIC modules.
hardware_targets = ["rp2350", "bcm2712", "linux"]

[[ports]]
name = "control"
direction = "input"
content_type = "FmpMessage"

[[ports]]
name = "notes"
direction = "output"
content_type = "OctetStream"
required = true

[commands]
accepts = ["status", "toggle", "select", "next", "prev"]

# Module-scope observability — exempt (see standards/observability.md §6).
[observability]
exempt = "audio/media-sample path — meaningful throughput is sample-rate (Hz·channels), not byte count; off-device bytes are observed at the network transport"
