version = "1.0.0"
hardware_targets = ["rp2350"]

[[ports]]
name = "sip_net_in"
direction = "input"
content_type = "OctetStream"

[[ports]]
name = "jitter_net_in"
index = 1
direction = "input"
content_type = "OctetStream"

[[ports]]
name = "mic"
index = 2
direction = "input"
content_type = "AudioSample"

[[ports]]
name = "sip_net_out"
direction = "output"
content_type = "OctetStream"

[[ports]]
name = "jitter_net_out"
index = 1
direction = "output"
content_type = "OctetStream"

[[ports]]
name = "audio"
index = 2
direction = "output"
content_type = "AudioSample"
required = true

[[ports]]
name = "rtp"
index = 3
direction = "output"
content_type = "OctetStream"

[[ports]]
name = "sip_ctrl"
index = 4
direction = "output"
content_type = "OctetStream"

[[ports]]
name = "call"
direction = "ctrl_input"
content_type = "FmpMessage"

[[resources]]
requires_contract = "channel"
access = "read"
