version = "1.0.0"
hardware_targets = ["rp2350", "bcm2712", "linux"]

# SessionCtrlV1 control channel from the anchor.
[[ports]]
name = "ctrl_in"
direction = "input"
content_type = "OctetStream"

# Raw byte data channel from the anchor (client bytes → worker).
[[ports]]
name = "data_in"
index = 1
direction = "input"
content_type = "OctetStream"

# SessionCtrlV1 replies back to the anchor.
[[ports]]
name = "ctrl_out"
direction = "output"
content_type = "OctetStream"

# Processed byte stream back to the anchor (worker bytes → client).
[[ports]]
name = "data_out"
index = 1
direction = "output"
content_type = "OctetStream"

[[resources]]
requires_contract = "channel"
access = "read"
