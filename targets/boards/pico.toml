# Raspberry Pi Pico (original)
# RP2040, no wireless, on-board LED on GP25.

[board]
id = "pico"
silicon = "rp2040"
description = "Raspberry Pi Pico"

[gpio]
reserved_pins = []

# Public hardware-rig contract (see .context/rfc_hardware_rig.md §7).
[rig]
artifact = "uf2"
deploy = ["deploy.uf2_mount", "deploy.picotool", "deploy.swd"]
preferred_deploy = "deploy.uf2_mount"
console = ["console.usb_cdc", "console.serial"]
preferred_console = "console.usb_cdc"
observe = ["observe.console_regex", "observe.usb_enumeration"]
power = ["power.cycle"]
default_timeout_s = 20
