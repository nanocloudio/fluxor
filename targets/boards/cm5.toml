# Raspberry Pi 5 / Compute Module 5
# BCM2712 bare-metal with RP1 peripherals via PCIe
#
# Build: make cm5
# Boot:  Copy kernel8.img to SD card /boot/firmware/ alongside GPU firmware
#
# Required config.txt:
#   arm_64bit=1
#   kernel=kernel8.img
#   enable_uart=1
#   pciex4_reset=0

[board]
id = "cm5"
silicon = "bcm2712"
description = "Raspberry Pi 5 / Compute Module 5 (bare-metal)"

# `board-cm5` selects the RAM-origin, UART base, and RP1 init that the VPU
# firmware leaves for a real Pi 5. Without it, the same silicon builds for
# QEMU virt. Inherits rust_target + module_target from silicon.
[build]
cargo_features = ["board-cm5"]

# GPIO 14/15 reserved for UART console, activity LED on GPIO 25 (active low via RP1)
[gpio]
reserved_pins = [14, 15]

[gpio.reserved_reasons]
14 = "UART0 TX (console)"
15 = "UART0 RX (console)"

[platform.net]
phy = "ethernet"
driver = "rp1_gem"

# Public hardware-rig contract (see .context/rfc_hardware_rig.md §7).
# Board-level facts only — bench-specific bindings live in private rig
# profiles under ~/.config/fluxor/labs/. Capability strings are the fully
# qualified vocabulary from RFC §6 and are matched exactly (no aliases).
[rig]
artifact = "kernel8_img"
deploy = ["deploy.netboot_tftp", "deploy.bootfs_copy", "deploy.sd_image_writer"]
preferred_deploy = "deploy.netboot_tftp"
# `console.netconsole` reads the `platform.debug.to: net` UDP
# broadcast — the kernel's `log_ring` contents on ethernet rather
# than the wire UART. Graphs that enable `debug.to: net` can validate
# `[nvme] / [fat32] / [ip] / [sched]` markers without a serial cable.
console = ["console.serial", "console.netconsole"]
preferred_console = "console.serial"
telemetry = ["telemetry.monitor_udp"]
preferred_telemetry = "telemetry.monitor_udp"
observe = ["observe.console_regex", "observe.netboot_fetch", "observe.monitor_stream"]
power = ["power.cycle"]
default_timeout_s = 30
