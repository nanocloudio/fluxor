# Raspberry Pi Pico W (original)
# RP2040 with CYW43439 wireless (uses GP23-25, GP29)
# 2MB flash, 264KB SRAM.

[board]
id = "picow"
silicon = "rp2040"
description = "Raspberry Pi Pico W"

# Default PIO: gSPI cmd (CYW43) on PIO1, I2S stream on PIO0
[[hardware.pio]]
pio_idx = 1
data_pin = 24
clk_pin = 29
extra_pin = 255

[[hardware.pio]]
pio_idx = 0
data_pin = 28
clk_pin = 26
extra_pin = 27

[gpio]
reserved_pins = [23, 24, 25, 29]

[gpio.reserved_reasons]
23 = "WL_GPIO_ON (wireless power)"
24 = "WL_GPIO_CS (wireless SPI CS)"
25 = "WL_GPIO_CLK (wireless SPI CLK)"
29 = "WL_CLK (wireless SPI clock) / VSYS sense (ADC3)"

[platform.net]
phy = "wifi"
driver = "cyw43"

# Public hardware-rig contract (see .context/rfc_hardware_rig.md §7).
[rig]
artifact = "uf2"
deploy = ["deploy.uf2_mount", "deploy.picotool", "deploy.swd"]
preferred_deploy = "deploy.uf2_mount"
console = ["console.usb_cdc", "console.serial"]
preferred_console = "console.usb_cdc"
observe = ["observe.console_regex", "observe.usb_enumeration"]
power = ["power.cycle"]
default_timeout_s = 20
