# Waveshare RP2350-Touch-LCD-4
# RP2350B with ST7701S 480x480 display and GT911 touch controller.
# Display data bus (D0-D15: GPIO 24-39) and control signals are
# managed by module ownership, not globally reserved.

[board]
id = "waveshare-lcd4"
silicon = "rp2350b"
description = "Waveshare RP2350-Touch-LCD-4"

[gpio]
reserved_pins = []

# Public hardware-rig contract (see .context/rfc_hardware_rig.md §7).
[rig]
artifact = "uf2"
deploy = ["deploy.uf2_mount", "deploy.picotool", "deploy.swd"]
preferred_deploy = "deploy.uf2_mount"
console = ["console.usb_cdc", "console.serial"]
preferred_console = "console.usb_cdc"
observe = ["observe.console_regex", "observe.usb_enumeration"]
power = ["power.cycle"]
default_timeout_s = 20
