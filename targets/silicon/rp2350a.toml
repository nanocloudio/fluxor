# RP2350A — QFN-60, 30 GPIO, 2 PIO blocks
# Single binary with RP2350B (superset), runtime silicon detection gates pins.

[target]
id = "rp2350a"
family = "rp2"
description = "RP2350A (QFN-60, 30 GPIO)"

[build]
rust_target = "thumbv8m.main-none-eabihf"
cargo_features = ["chip-rp2350b"]
uf2_family_id = "0xe48bff59"
module_target = "thumbv8m.main-none-eabihf"

[gpio]
max_pin = 29

[peripherals]
spi_count = 2
i2c_count = 2
uart_count = 2
adc_channels = 4
pwm_slices = 8
pio_count = 2
pio_state_machines = 4
dma_channels = 16

# SPI valid pin combinations: [miso, mosi, sck]
[peripherals.spi0]
valid_pins = [[0,3,2], [4,7,6], [16,19,18], [20,23,22]]

[peripherals.spi1]
valid_pins = [[8,11,10], [12,11,10], [12,15,14], [24,27,26]]

# I2C valid pin combinations: [sda, scl]
[peripherals.i2c0]
valid_pins = [[0,1], [4,5], [8,9], [12,13], [16,17], [20,21], [24,25], [28,29]]

[peripherals.i2c1]
valid_pins = [[2,3], [6,7], [10,11], [14,15], [18,19], [22,23], [26,27]]

[memory]
flash_base = "0x10000000"
flash_size = "0x400000"
ram_base = "0x20000000"
ram_size = "0x80000"

[kernel]
watchdog_ctrl = "0x400D8000"
boot2_src = "0x400e0000"
state_arena_kb = 256
buffer_arena_kb = 32
config_buffer_kb = 16
flash_erase_block_size = "0x80000000"
flash_erase_cmd = "0x00"

[kernel.bootsel]
dma_ch_count = 16
qspi_ss_bit = 27
flash_release_addr = "0x400D0000"
flash_release_value = "0x01"
pad_addr = "0x40040018"
pad_value = "0xCA"
ctrl_addr = "0x4003000C"
ctrl_value = "0x8005"
status_addr = "0x40030008"
gpio_hi_addr = "0xD0000008"
