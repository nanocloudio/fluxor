# RP2040 — Dual Cortex-M0+, 30 GPIO, 2 PIO blocks

[target]
id = "rp2040"
family = "rp2"
description = "RP2040 (Dual Cortex-M0+, 30 GPIO)"

[build]
rust_target = "thumbv6m-none-eabi"
cargo_features = ["chip-rp2040"]
uf2_family_id = "0xe48bff56"
module_target = "thumbv6m-none-eabi"

[gpio]
max_pin = 29

[peripherals]
spi_count = 2
i2c_count = 2
uart_count = 2
adc_channels = 4
pwm_slices = 8
pio_count = 2
pio_state_machines = 4
dma_channels = 12

# SPI valid pin combinations: [miso, mosi, sck]
# RP2040 funcsel same pattern as RP2350A
[peripherals.spi0]
valid_pins = [[0,3,2], [4,7,6], [16,19,18], [20,23,22]]

[peripherals.spi1]
valid_pins = [[8,11,10], [12,11,10], [12,15,14], [24,27,26]]

# I2C valid pin combinations: [sda, scl]
[peripherals.i2c0]
valid_pins = [[0,1], [4,5], [8,9], [12,13], [16,17], [20,21], [24,25], [28,29]]

[peripherals.i2c1]
valid_pins = [[2,3], [6,7], [10,11], [14,15], [18,19], [22,23], [26,27]]

[memory]
flash_base = "0x10000000"
flash_size = "0x200000"
ram_base = "0x20000000"
ram_size = "0x42000"
