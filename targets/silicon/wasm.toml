# WASM target — runs the kernel as a wasm32-unknown-unknown module
# instantiated by a host (browser, wasmtime, edge runtime).
#
# See `docs/architecture/wasm_platform.md` for the platform contract.
# The same `<config>.wasm` runs on any host that implements the
# host-import surface; per-host built-ins live in their own host docs.

[target]
id = "wasm"
family = "wasm"
description = "WASM (wasm32, host-instantiated)"

[build]
rust_target = "wasm32-unknown-unknown"
cargo_features = ["host-wasm"]
uf2_family_id = "0x00000000"
module_target = "wasm32-unknown-unknown"

[gpio]
max_pin = 0

[peripherals]
spi_count = 0
i2c_count = 0
uart_count = 0
adc_channels = 0
pwm_slices = 0
pio_count = 0
pio_state_machines = 0
dma_channels = 0

# [kernel] capacity tunables for the WASM target live in
# `modules/sdk/config.rs::profile_wasm` (selected at compile time via
# `cfg(target_arch = "wasm32")`). build.rs takes the early-return path
# for `host-wasm`; STATE_ARENA / BUFFER_ARENA / CONFIG_ARENA come from
# `src/platform/wasm/chip.rs` re-exporting `abi::config::kernel`. Edit
# `modules/sdk/config.rs::profile_wasm::kernel` to change capacities.

[memory]
ram_base = "0x00000000"
ram_size = "0x00000000"
flash_base = "0x00000000"
flash_size = "0x00000000"
