# RP2350B — QFN-80, 48 GPIO, 3 PIO blocks

[target]
id = "rp2350b"
family = "rp2"
description = "RP2350B (QFN-80, 48 GPIO)"

[build]
rust_target = "thumbv8m.main-none-eabihf"
cargo_features = ["chip-rp2350b"]
uf2_family_id = "0xe48bff59"
module_target = "thumbv8m.main-none-eabihf"

[gpio]
max_pin = 47

[peripherals]
spi_count = 2
i2c_count = 2
uart_count = 2
adc_channels = 4
pwm_slices = 8
pio_count = 3
pio_state_machines = 4
dma_channels = 16

# SPI valid pin combinations: [miso, mosi, sck]
[peripherals.spi0]
valid_pins = [
    [0,3,2], [4,7,6], [16,19,18], [20,23,22],
    [32,35,34], [36,39,38],
]

[peripherals.spi1]
valid_pins = [
    [8,11,10], [12,11,10], [12,15,14], [24,27,26],
    [28,31,30], [40,43,42], [44,47,46],
]

# I2C valid pin combinations: [sda, scl]
[peripherals.i2c0]
valid_pins = [
    [0,1], [4,5], [8,9], [12,13], [16,17], [20,21], [24,25], [28,29],
    [32,33], [36,37], [40,41], [44,45],
]

[peripherals.i2c1]
valid_pins = [
    [2,3], [6,7], [10,11], [14,15], [18,19], [22,23], [26,27],
    [30,31], [34,35], [38,39], [42,43], [46,47],
]

[memory]
flash_base = "0x10000000"
flash_size = "0x400000"
ram_base = "0x20000000"
ram_size = "0x80000"

[isolation]
mpu_regions = 8

[kernel]
watchdog_ctrl = "0x400D8000"
boot2_src = "0x400e0000"
state_arena_kb = 256
buffer_arena_kb = 32
config_buffer_kb = 16
config_arena_kb = 16
flash_erase_block_size = "0x80000000"
flash_erase_cmd = "0x00"

[kernel.bootsel]
dma_ch_count = 16
qspi_ss_bit = 27
flash_release_addr = "0x400D0000"
flash_release_value = "0x01"
pad_addr = "0x40040018"
pad_value = "0xCA"
ctrl_addr = "0x4003000C"
ctrl_value = "0x8005"
status_addr = "0x40030008"
gpio_hi_addr = "0xD0000008"
