# Storage stack — provides block device + filesystem modules.
#
# v1: no service injection. Consumers wire to fat32 directly
# (e.g. fat32.files -> bank.files in user YAML).
# A future services.fs concept may be added when an FS provider
# contract exists.

[stack]
name = "storage"

# ── RP2 family: SD card via SPI ──────────────────────────────────────────
[[variant]]
match = { family = "rp2", media = "sd" }
modules = [
  { name = "sd" },
  { name = "fat32" },
]
wiring = [
  "sd.blocks -> fat32.blocks",
]

# ── CM5: NVMe on the external x1 slot + FAT32 ─────────────────────────
# `bind = "m2_primary"` selects the board-local alias for the external
# NVMe HAT+. Board topology (root complex, slot, MSI GIC SPI) lives
# in the platform's PCIe alias table — nothing here or in user YAML
# names `pcie1` directly. `fat32.block_writes → nvme.requests` is the
# write path; drop that edge if only reads are needed.
[[variant]]
match = { board = "cm5", media = "nvme" }
modules = [
  { name = "nvme", params = { bind = "m2_primary" } },
  { name = "fat32" },
]
wiring = [
  "nvme.blocks -> fat32.blocks",
  "fat32.block_writes -> nvme.requests",
]

# ── Linux: host filesystem ──────────────────────────────────────────────
[[variant]]
match = { family = "linux" }
modules = []
wiring = []
service = "host"
