[stack]
name = "debug"

# Opt-in log observability.
#
# The local-transport debug path (UART on cm5, USB CDC on rp) is owned by
# the platform runtime: it drains `kernel::log_ring` into a board-provided
# sink each tick, independent of any modules. No YAML opt-in is required
# for local output.
#
#   cm5:  tio /dev/ttyUSB0         (115200 by default)
#   rp:   cat /dev/ttyACM0
#
# This stack adds the *network* transport as a second consumer of the
# same log ring. `debug: { to: net }` inserts `log_net` and wires it to
# the ip stack so log bytes fan out to UDP alongside the local sink. The
# ring is multi-consumer (independent tails); neither consumer steals
# bytes from the other.
#
# ## Dependencies
#
# `to: net` wires `log_net` to `ip.net_in` / `ip.net_out`, which come
# from another `platform:` stack. Config validation fails with a clear
# "unknown module" error if the ip stack is missing. Pair with
# `platform: net: {}`.
#
# Usage:
#
#   platform:
#     net: {}                        # required for `to: net`
#     debug:
#       to: net
#       # dst_ip: "0xC0A80A0A"       # optional, destination for log_net
#       # dst_port: 6666
#       # bind_port: 6667
#
# Host capture:
#   to: net  →  nc -ul 6666           (or `fluxor monitor --net :6666`)
#
# The same ring feeds MON_* monitor lines when the monitor overlay is on.

# `dst_ip` must resolve to a unicast collector — the ip module
# rejects broadcast at the send path. Resolution order:
#   1. `platform.debug.dst_ip` in the user YAML (per-config override)
#   2. `[debug] collector_ip` in `~/.config/fluxor/host.toml` (per-dev)
#   3. hard-fail with a pointer at the missing field.
# ── Silicon families: `ip` module produced by `stacks/net.toml` ──
# rp2 / bcm / qemu-virt wire the netconsole alongside their IP stack.
[[variant]]
match = { to = "net", family = "rp2" }
modules = [
  { name = "log_net", params = {
      dst_ip    = "user:dst_ip|host:debug.collector_ip|required",
      dst_port  = "user:dst_port|host:debug.collector_port",
      bind_port = "user:bind_port|host:debug.bind_port",
  } },
]
wiring = [
  "ip.net_out -> log_net.net_in",
  "log_net.net_out -> ip.net_in",
]

[[variant]]
match = { to = "net", family = "bcm" }
modules = [
  { name = "log_net", params = {
      dst_ip    = "user:dst_ip|host:debug.collector_ip|required",
      dst_port  = "user:dst_port|host:debug.collector_port",
      bind_port = "user:bind_port|host:debug.bind_port",
  } },
]
wiring = [
  "ip.net_out -> log_net.net_in",
  "log_net.net_out -> ip.net_in",
]

# ── Linux family: `stacks/net.toml`'s `family = "linux"` variant
# provides `linux_net` (no separate `ip` module). When a silicon
# graph is run via `runtime_override: linux`, the net stack expands
# to linux_net but the debug overlay still expects a NetProto-
# producing module — point it at linux_net by the same shape. The
# wire format on both endpoints is `NetProto`, identical to the
# `ip`-fronted variants above.
[[variant]]
match = { to = "net", family = "linux" }
modules = [
  { name = "log_net", params = {
      dst_ip    = "user:dst_ip|host:debug.collector_ip|required",
      dst_port  = "user:dst_port|host:debug.collector_port",
      bind_port = "user:bind_port|host:debug.bind_port",
  } },
]
wiring = [
  "linux_net.net_out -> log_net.net_in",
  "log_net.net_out -> linux_net.net_in",
]

# ----------------------------------------------------------------------------
# Overlays — additive switches that layer on top of the chosen transport.
# ----------------------------------------------------------------------------

# ── wasm: browser-console sink ──────────────────────────────────────────
#
# `platform.debug: { to: console }` is the wasm-family default. The
# kernel's `log::*` macros are already routed to `host_log` on the
# wasm platform (see `src/platform/wasm.rs::WASM_LOGGER`), which the
# JS shim implements by writing to `console.log` / `.warn` / `.error`
# (level 0..4). So `to: console` is a no-module variant — it just
# declares the intent so the validator knows what the user asked for
# and refuses combinations that wouldn't fire (e.g. `to: console`
# with a non-wasm target would be a mismatch).
[[variant]]
match = { family = "wasm", to = "console" }
modules = []
wiring = []

# ── wasm: DOM scrollback terminal sink ──────────────────────────────────
#
# `platform.debug: { to: terminal }` adds an in-page `<pre>`
# scrollback widget that the kernel's log ring drains into. Same
# multi-consumer log ring as `log_net` on embedded targets, so this
# composes with `to: console` (both can be enabled via successive
# overlay invocations, or by toggling).
#
# The terminal renders inside a `presentation: surface` with
# `role: terminal`. The synthesised wasm runtime shell auto-renders
# the surface based on the graph YAML's presentation block.
[[variant]]
match = { family = "wasm", to = "terminal" }
modules = [
  { name = "log_terminal", type = "wasm_browser_terminal" },
]
wiring = []

# Monitor telemetry: periodic `MON_HIST` lines for the `fluxor monitor` CLI
# (per-module step-time histogram). Orthogonal to `to:` — the monitor
# module emits via log::info!, and whatever transports are active carry
# it out. `MON_FAULT` is emitted by the kernel itself, so it streams
# regardless.
#
#   platform:
#     debug:
#       monitor: true
#       # monitor_interval_ms: 5000   # optional; default 5000
[[overlay]]
match = { monitor = "*" }
modules = [
  { name = "monitor", params = {
      interval_ms = "user:monitor_interval_ms",
  } },
]
wiring = []

# Observability collector: the `observe` module subsumes `monitor` and adds the
# module-scope signal path. Kernel-scope step histograms (`MON_HIST`) stream
# immediately; module-scope `MON_METRIC` / `MON_SPAN` light up once an
# instrumented module's telemetry output is wired to `observe.telemetry`. Emits
# via the same `log_ring` path, so whatever `to:` transport is active carries it.
#
#   platform:
#     debug:
#       observe: true
#       # observe_interval_ms: 5000   # optional; default 5000
[[overlay]]
match = { observe = "*" }
modules = [
  { name = "observe", params = {
      interval_ms = "user:observe_interval_ms",
  } },
]
wiring = []

# Telemetry export: `platform.debug.export_telemetry: <kind>` selects a
# pluggable exporter. `udp` inserts `otel_udp_sample`, which drains the same
# `Telemetry` edge as `observe` and forwards id-interned records as compact UDP
# datagrams (one batch envelope per datagram, see
# `modules/sdk/contracts/telemetry.rs`) — the metric/span analogue of
# `log_net`'s log forwarding. Like `log_net` it needs a unicast `dst_ip`
# (per-config or `~/.config/fluxor`). The overlay supplies the module + its
# datagram plumbing to the family's net module; you still wire each instrumented
# source explicitly, e.g. `wiring: [ ip.telemetry -> otel_udp_sample.telemetry ]`.
# Matched by exact value so future exporters (`otlp`) add their own overlay
# without colliding.
#
#   platform:
#     debug:
#       export_telemetry: udp
#       # export_dst_ip: "0xC0A80A0A"   # else host.toml debug.collector_ip
#       # export_flush_ms: 1000         # optional; max partial-batch latency
[[overlay]]
match = { export_telemetry = "udp", family = "rp2" }
modules = [
  { name = "otel_udp_sample", params = {
      dst_ip    = "user:export_dst_ip|host:debug.collector_ip|required",
      dst_port  = "user:export_dst_port|host:debug.telemetry_port",
      bind_port = "user:export_bind_port|host:debug.telemetry_bind_port",
      flush_ms  = "user:export_flush_ms",
  } },
]
wiring = [
  "ip.net_out -> otel_udp_sample.net_in",
  "otel_udp_sample.net_out -> ip.net_in",
]

[[overlay]]
match = { export_telemetry = "udp", family = "bcm" }
modules = [
  { name = "otel_udp_sample", params = {
      dst_ip    = "user:export_dst_ip|host:debug.collector_ip|required",
      dst_port  = "user:export_dst_port|host:debug.telemetry_port",
      bind_port = "user:export_bind_port|host:debug.telemetry_bind_port",
      flush_ms  = "user:export_flush_ms",
  } },
]
wiring = [
  "ip.net_out -> otel_udp_sample.net_in",
  "otel_udp_sample.net_out -> ip.net_in",
]

[[overlay]]
match = { export_telemetry = "udp", family = "linux" }
modules = [
  { name = "otel_udp_sample", params = {
      dst_ip    = "user:export_dst_ip|host:debug.collector_ip|required",
      dst_port  = "user:export_dst_port|host:debug.telemetry_port",
      bind_port = "user:export_bind_port|host:debug.telemetry_bind_port",
      flush_ms  = "user:export_flush_ms",
  } },
]
wiring = [
  "linux_net.net_out -> otel_udp_sample.net_in",
  "otel_udp_sample.net_out -> linux_net.net_in",
]

# `export_telemetry: otlp` inserts `otlp_http` — the OTLP/HTTP (JSON) exporter.
# It opens an outbound TCP connection to an OTLP/HTTP collector and POSTs metrics
# as OpenTelemetry Protocol JSON to `/v1/metrics`, resolving `(module,id)` names
# on-device, so no host decoder is needed (unlike `udp`). bcm/rp2 only (the
# module is heavier than the UDP exporter). The compiler injects the per-config
# id-table param; you still wire each instrumented source's telemetry output.
#
#   platform:
#     debug:
#       export_telemetry: otlp
#       # export_dst_ip: "0xC0A80A0A"   # else host.toml debug.collector_ip
#       # export_dst_port: 4318         # OTLP/HTTP port
[[overlay]]
match = { export_telemetry = "otlp", family = "rp2" }
modules = [
  { name = "otlp_http", params = {
      dst_ip   = "user:export_dst_ip|host:debug.collector_ip|required",
      dst_port = "user:export_dst_port|host:debug.otlp_port",
      flush_ms = "user:export_flush_ms",
  } },
]
wiring = [
  "ip.net_out -> otlp_http.net_in",
  "otlp_http.net_out -> ip.net_in",
]

[[overlay]]
match = { export_telemetry = "otlp", family = "bcm" }
modules = [
  { name = "otlp_http", params = {
      dst_ip   = "user:export_dst_ip|host:debug.collector_ip|required",
      dst_port = "user:export_dst_port|host:debug.otlp_port",
      flush_ms = "user:export_flush_ms",
  } },
]
wiring = [
  "ip.net_out -> otlp_http.net_in",
  "otlp_http.net_out -> ip.net_in",
]
