[stack]
name = "debug"

# Opt-in log observability.
#
# The local-transport debug path (UART on cm5, USB CDC on rp) is owned by
# the platform runtime: it drains `kernel::log_ring` into a board-provided
# sink each tick, independent of any modules. No YAML opt-in is required
# for local output.
#
#   cm5:  tio /dev/ttyUSB0         (115200 by default)
#   rp:   cat /dev/ttyACM0
#
# This stack adds the *network* transport as a second consumer of the
# same log ring. `debug: { to: net }` inserts `log_net` and wires it to
# the ip stack so log bytes fan out to UDP alongside the local sink. The
# ring is multi-consumer (independent tails); neither consumer steals
# bytes from the other.
#
# ## Dependencies
#
# `to: net` wires `log_net` to `ip.net_in` / `ip.net_out`, which come
# from another `platform:` stack. Config validation fails with a clear
# "unknown module" error if the ip stack is missing. Pair with
# `platform: net: {}`.
#
# Usage:
#
#   platform:
#     net: {}                        # required for `to: net`
#     debug:
#       to: net
#       # dst_ip: "0xC0A80A0A"       # optional, destination for log_net
#       # dst_port: 6666
#       # bind_port: 6667
#
# Host capture:
#   to: net  →  nc -ul 6666           (or `fluxor monitor --net :6666`)
#
# The same ring feeds MON_* monitor lines when the monitor overlay is on.

[[variant]]
match = { to = "net" }
modules = [
  { name = "log_net", params = {
      dst_ip    = "user:dst_ip",
      dst_port  = "user:dst_port",
      bind_port = "user:bind_port",
  } },
]
wiring = [
  "ip.net_out -> log_net.net_in",
  "log_net.net_out -> ip.net_in",
]

# ----------------------------------------------------------------------------
# Overlays — additive switches that layer on top of the chosen transport.
# ----------------------------------------------------------------------------

# Monitor telemetry: periodic `MON_HIST` lines for the `fluxor monitor` CLI
# (per-module step-time histogram). Orthogonal to `to:` — the monitor
# module emits via log::info!, and whatever transports are active carry
# it out. `MON_FAULT` is emitted by the kernel itself, so it streams
# regardless.
#
#   platform:
#     debug:
#       monitor: true
#       # monitor_interval_ms: 5000   # optional; default 5000
[[overlay]]
match = { monitor = "*" }
modules = [
  { name = "monitor", params = {
      interval_ms = "user:monitor_interval_ms",
  } },
]
wiring = []
