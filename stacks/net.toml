[stack]
name = "net"

[[variant]]
match = { board = "qemu-virt", phy = "ethernet", driver = "virtio_net" }
modules = [
  { name = "virtio_net" },
  { name = "ip", params = { use_dhcp = "1" } },
]
wiring = [
  "virtio_net.frames_rx -> ip.frames_rx",
  "ip.frames_tx -> virtio_net.frames_tx",
]

[[variant]]
match = { board = "pico2w", phy = "wifi", driver = "cyw43" }
modules = [
  { name = "cyw43" },
  { name = "wifi", params = { ssid = "env:WIFI_SSID", password = "env:WIFI_PASSWORD", security = "env:WIFI_SECURITY" } },
  { name = "ip", params = { use_dhcp = "1" } },
]
wiring = [
  "wifi.wifi_ctrl -> cyw43.wifi_ctrl",
  "cyw43.status -> wifi.status",
  "cyw43.frames_rx -> ip.frames_rx",
  "ip.frames_tx -> cyw43.frames_tx",
]

[[variant]]
match = { board = "picow", phy = "wifi", driver = "cyw43" }
modules = [
  { name = "cyw43" },
  { name = "wifi", params = { ssid = "env:WIFI_SSID", password = "env:WIFI_PASSWORD", security = "env:WIFI_SECURITY" } },
  { name = "ip", params = { use_dhcp = "1" } },
]
wiring = [
  "wifi.wifi_ctrl -> cyw43.wifi_ctrl",
  "cyw43.status -> wifi.status",
  "cyw43.frames_rx -> ip.frames_rx",
  "ip.frames_tx -> cyw43.frames_tx",
]

[[variant]]
match = { board = "cm5", phy = "ethernet", driver = "rp1_gem" }
modules = [
  { name = "rp1_gem" },
  { name = "conn_guard" },
  { name = "ip", params = { use_dhcp = "1" } },
]
# RX path passes through conn_guard for SYN-flood admission control.
# TX path goes direct from ip back to the NIC (no per-egress filtering).
wiring = [
  "rp1_gem.frames_rx -> conn_guard.frames_rx",
  "conn_guard.frames_tx -> ip.frames_rx",
  "ip.frames_tx -> rp1_gem.frames_tx",
]

[[variant]]
match = { family = "linux" }
modules = [
  { name = "linux_net" },
]
wiring = []

# Debug log overlays live in `stacks/debug.toml`. To enable netconsole:
#
#   platform:
#     net: {}
#     debug:
#       to: net
