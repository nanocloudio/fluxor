[package]
name = "fluxor-tools"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/nanocloudio/fluxor"
description = "Host-side tools for Fluxor firmware configuration"

[[bin]]
name = "fluxor"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5.54", features = ["derive"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.148"
serde_yaml = "0.9.34"  # deprecated but functional; consider serde_yml for future
sha2 = "0.10"
thiserror = "2.0.17"
toml = "0.8"
